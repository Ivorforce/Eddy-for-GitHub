    // off <body> because this script runs in <head> before <body> exists, and
    // because the dropdown can change it mid-session — we want the freshest
    // value at every call. See the Options dropdown in index.html and
    // poll.run_loop on the server.
    const autoMode = () => (document.body && document.body.dataset.autoRefresh) || "live";

    // Status pill tooltip in idle state. Hourly / Daily show the wall-clock
    // tick the loop will fire on next (computed locally — the cadence is
    // anchored to wall-clock boundaries, so no server round-trip is needed
    // to keep the countdown honest). Live and Manual carry a static message;
    // Live deliberately has no countdown because at 5min granularity it's
    // noise, and Manual has no scheduled fetch to count toward.
    const nextTickLabel = () => {
      const mode = autoMode();
      if (mode === "manual") return "Manual — auto-refresh off (click ↻ to fetch)";
      if (mode === "live")   return "Live — polling every 5 min";
      const now = new Date();
      const next = new Date(now);
      if (mode === "hourly") {
        next.setMinutes(0, 0, 0);
        next.setHours(next.getHours() + 1);
      } else {  // daily
        next.setHours(4, 0, 0, 0);
        if (next <= now) next.setDate(next.getDate() + 1);
      }
      const mins = Math.max(0, Math.round((next - now) / 60000));
      const hh = String(next.getHours()).padStart(2, "0");
      const mm = String(next.getMinutes()).padStart(2, "0");
      const rel = mins < 60 ? `${mins}m` : `${Math.floor(mins/60)}h ${mins%60}m`;
      const label = mode.charAt(0).toUpperCase() + mode.slice(1);
      return `${label} — next at ${hh}:${mm} (in ${rel})`;
    };

    // Global status indicator. HTMX request lifecycle drives loading/idle;
    // online/offline events and HX-Trigger 'showError' drive the error state.
    const setStatus = (state, msg) => {
      // Hard rule: while the browser thinks we're offline, the dot stays red.
      // Stops a stray successful afterRequest (in-flight request that completed
      // around the same time the offline event fired) from flipping back to idle.
      if (!navigator.onLine) {
        state = "error";
        msg = "Offline";
      }
      const dot = document.getElementById("status-dot");
      if (!dot) return;
      dot.className = "status-dot status-" + state;
      dot.title = msg;
    };
    if (!navigator.onLine) setStatus("error", "Offline");
    window.addEventListener("online",  () => setStatus("idle", nextTickLabel()));
    window.addEventListener("offline", () => setStatus("error", "Offline"));

    // Min visible duration so a sub-100ms 304 round-trip still flashes the
    // loading state long enough for the user to perceive it.
    const MIN_LOADING_MS = 300;
    let loadingSince = 0;
    document.addEventListener("htmx:beforeRequest", () => {
      // Don't drown out a sticky error state with transient loading flicker.
      const dot = document.getElementById("status-dot");
      if (dot && dot.classList.contains("status-error")) return;
      loadingSince = Date.now();
      setStatus("loading", "Updating…");
    });
    document.addEventListener("htmx:afterRequest", (e) => {
      const settle = () => {
        if (e.detail.successful) {
          setStatus("idle", nextTickLabel());
        } else {
          const code = e.detail.xhr ? e.detail.xhr.status : 0;
          const txt  = (e.detail.xhr && e.detail.xhr.responseText) || "Network error";
          setStatus("error", `HTTP ${code}: ${String(txt).slice(0, 240)}`);
        }
      };
      const elapsed = Date.now() - loadingSince;
      if (elapsed < MIN_LOADING_MS) {
        setTimeout(settle, MIN_LOADING_MS - elapsed);
      } else {
        settle();
      }
    });
    // Server-handled errors (route caught + still rendered the table) come
    // through as HX-Trigger 'showError' on a 200 response.
    document.addEventListener("showError", (e) => {
      setStatus("error", e.detail.message || "Error");
    });

    document.addEventListener("htmx:responseError", (e) => {
      const tr = e.detail.elt.closest("tr");
      if (tr) tr.classList.add("action-error");
      const status = e.detail.xhr.status;
      console.error("Action failed:", status, e.detail.xhr.responseText);
    });

    // Custom tooltip layer. Shows ~120ms after hover (instead of the
    // browser's OS-controlled multi-second delay). For [title] sources
    // we remove the attribute on hover (and restore on leave) so the
    // browser doesn't also show its own native tooltip on top; for
    // [data-tip] sources no swap is needed.
    //
    // The tooltip is a plain fixed-position div, NOT a popover. We tried
    // popover="manual" originally so it would stack above open
    // .action-popovers (which are top-layer popovers, unbeatable with
    // z-index alone), but entering the top layer caused a one-frame
    // cursor recomputation in Chrome that visibly flashed `cursor: help`
    // back to default on every hover and stuck until the next mousemove.
    // The stacking concern is moot in practice: an open .action-popover
    // means the user is interacting with that popover, not hovering
    // stats — the two flows don't overlap.
    const TOOLTIP_DELAY_MS = 120;
    let tooltipEl = null;
    let tooltipTimer = null;
    let tooltipTarget = null;
    // When the source is an SVG <title> child (used on author icons et al.
    // for accessibility), we have to remove the node to suppress the native
    // browser tooltip and re-insert it on hide. Stash {parent, node} here.
    let tooltipStashedSvgTitle = null;
    // Lazy-init so the script can run in <head> before <body> exists.
    const ensureTooltip = () => {
      if (!tooltipEl) {
        tooltipEl = document.createElement("div");
        tooltipEl.className = "custom-tooltip";
        document.body.appendChild(tooltipEl);
      }
      return tooltipEl;
    };

    const hideTooltip = () => {
      clearTimeout(tooltipTimer);
      if (tooltipEl) {
        tooltipEl.classList.remove("shown");
      }
      if (tooltipTarget) {
        const stashed = tooltipTarget.getAttribute("data-stashed-title");
        if (stashed !== null) {
          tooltipTarget.setAttribute("title", stashed);
          tooltipTarget.removeAttribute("data-stashed-title");
        }
        tooltipTarget = null;
      }
      if (tooltipStashedSvgTitle) {
        const { parent, node } = tooltipStashedSvgTitle;
        // Re-insert at the front so SVG semantics stay intact.
        parent.insertBefore(node, parent.firstChild);
        tooltipStashedSvgTitle = null;
      }
    };

    // True if the element (or any descendant) has horizontally clipped text.
    // Used to suppress tooltips that just duplicate visible text when nothing
    // is actually being clipped — see the mouseover handler below.
    const isTextTruncated = (el) => {
      const queue = [el];
      while (queue.length) {
        const node = queue.shift();
        if (node.scrollWidth > node.clientWidth + 1) return true;
        for (const child of node.children) queue.push(child);
      }
      return false;
    };

    // Resolve the trigger element + text for a hover event: a [data-tip]
    // ancestor (preferred — no native browser tooltip to suppress, so no
    // attribute swap, so no cursor-help flicker), a [title] ancestor
    // (legacy — handler still has to swap title→data-stashed-title to
    // suppress the slow native tooltip), or an SVG with a <title> child
    // (also swapped, since SVG <title> renders a native tooltip too).
    const resolveTooltipTrigger = (eventTarget) => {
      // data-tip-html: a small pre-rendered HTML fragment (inline `code`,
      // shortened refs, @mentions). Like data-tip but the tooltip gets
      // innerHTML, not textContent. No native tooltip to suppress.
      const htmlTipped = eventTarget.closest("[data-tip-html]");
      if (htmlTipped) return { target: htmlTipped, html: htmlTipped.getAttribute("data-tip-html"), text: null, svgTitleNode: null, suppressNative: false };
      const tipped = eventTarget.closest("[data-tip]");
      if (tipped) return { target: tipped, text: tipped.getAttribute("data-tip"), svgTitleNode: null, suppressNative: false };
      const titled = eventTarget.closest("[title]");
      if (titled) return { target: titled, text: titled.getAttribute("title"), svgTitleNode: null, suppressNative: true };
      const svg = eventTarget.closest("svg");
      if (svg) {
        const titleEl = svg.querySelector(":scope > title");
        if (titleEl) return { target: svg, text: titleEl.textContent, svgTitleNode: titleEl, suppressNative: true };
      }
      return null;
    };

    document.addEventListener("mouseover", (e) => {
      const trig = resolveTooltipTrigger(e.target);
      if (!trig || trig.target === tooltipTarget) return;
      hideTooltip();
      const { target, text, html, svgTitleNode, suppressNative } = trig;
      if (!text && !html) return;
      // When the tooltip text just duplicates the element's visible text,
      // it's a truncation fallback — only useful when the text is actually
      // clipped. For [title] sources we still stash so the browser doesn't
      // show its native tooltip; hideTooltip restores on mouseleave.
      // (data-tip-html is rich content, never a duplicate-of-visible-text.)
      const suppressDuplicate = !html && !svgTitleNode
        && text.trim() === target.textContent.trim()
        && !isTextTruncated(target);
      tooltipTarget = target;
      if (svgTitleNode) {
        tooltipStashedSvgTitle = { parent: target, node: svgTitleNode };
        target.removeChild(svgTitleNode);
      } else if (suppressNative) {
        target.setAttribute("data-stashed-title", text);
        target.removeAttribute("title");
      }
      if (suppressDuplicate) return;
      tooltipTimer = setTimeout(() => {
        const tip = ensureTooltip();
        // If the hovered element lives inside an open popover, the tooltip has
        // to live there too — a popover sits in the top layer, so a tooltip
        // parented to <body> renders *behind* it. Re-home on each show (and on
        // hide it just stays wherever; the next show re-homes it).
        const hostPopover = target.closest("[popover]:popover-open");
        const tipParent = hostPopover || document.body;
        if (tip.parentNode !== tipParent) tipParent.appendChild(tip);
        if (html) tip.innerHTML = html; else tip.textContent = text;
        // Park offscreen first so we can measure without painting at a
        // wrong location. Then position correctly and reveal via .shown.
        tip.style.left = "-10000px";
        tip.style.top = "-10000px";
        tip.classList.add("shown");
        const tipRect = tip.getBoundingClientRect();
        const rect = target.getBoundingClientRect();
        const margin = 6;
        let left = rect.left + rect.width / 2 - tipRect.width / 2;
        // Default above; flip below for triggers in the title's meta-row
        // (labels / diff stats / category pill) — anchoring above there
        // would land the tooltip on top of the title text itself.
        const below = !!target.closest(".meta-row");
        let top = below ? rect.bottom + margin : rect.top - tipRect.height - margin;
        // If the preferred side doesn't fit, flip to the other.
        if (below && top + tipRect.height > window.innerHeight - margin) {
          top = rect.top - tipRect.height - margin;
        } else if (!below && top < margin) {
          top = rect.bottom + margin;
        }
        left = Math.max(margin, Math.min(left, window.innerWidth - tipRect.width - margin));
        tip.style.left = `${left}px`;
        tip.style.top = `${top}px`;
      }, TOOLTIP_DELAY_MS);
    });

    document.addEventListener("mouseout", (e) => {
      if (!tooltipTarget) return;
      // Hide when the cursor leaves the target's subtree. relatedTarget
      // is null when leaving the window, which contains() treats as
      // outside — exactly what we want.
      if (!tooltipTarget.contains(e.relatedTarget)) hideTooltip();
    });

    // HTMX swaps can yank the tooltip target out of the DOM mid-hover.
    document.addEventListener("htmx:beforeSwap", hideTooltip);

    // Server-pushed refreshes via SSE. The poll loop bumps a fingerprint-
    // gated counter whenever it actually changed user-visible state; this
    // channel pings us with the new seq and we re-render the table from
    // the DB (no extra poll — the server already did one and that's *why*
    // we're being notified). The page is rendered with `<body data-event-seq=N>`,
    // where N is the server's current seq at render time. Seeding lastSeenSeq
    // from that — not from the first SSE message — handles the race where a
    // poll lands between page render and EventSource open: the first
    // message's seq would then be > N, and the comparison below triggers a
    // catch-up.
    //
    // /list renders the table without polling. Open popovers, dirty
    // textareas, focus, and cursor position survive the swap via the
    // htmx:beforeSwap/afterSwap handlers below. source: "#filters" mirrors
    // the manual refresh button's hx-include so the active filter values
    // ride along.
    //
    // Tab refocus fires POST /refresh?auto=1 (debounced 30s) so the server
    // re-polls GitHub when the user comes back to the window — fingerprint-
    // gated, so a quiet inbox is a 204 and a real change rides the SSE
    // channel like any other. The same debounce window also covers the
    // manual refresh button so clicking + alt-tabbing back doesn't double-fire.
    //
    // EventSource lifecycle drives the status pill's connectivity state:
    // `open` clears any prior disconnect, `error` arms a 3s timer that
    // flips to red "Disconnected" if we don't reconnect by then (rides out
    // brief blips; if the server actually died the browser auto-retries
    // forever and `open` never fires, so the pill stays red).
    //
    // Wrapped in DOMContentLoaded because this script runs in <head>, before
    // <body> is parsed — `document.body` is null until the parser reaches it,
    // and a bare access here threw, aborting the rest of the script.
    document.addEventListener("DOMContentLoaded", () => {
      let lastSeenSeq = parseInt(document.body.dataset.eventSeq || "0", 10);
      const sse = new EventSource("/events");
      sse.addEventListener("message", (e) => {
        const seq = parseInt(e.data, 10);
        if (Number.isNaN(seq)) return;
        if (seq <= lastSeenSeq) return;
        lastSeenSeq = seq;
        const target = document.querySelector("#notifications-table");
        if (!target) return;
        htmx.ajax("GET", "/list", { source: "#filters", target, swap: "innerHTML" });
      });
      let sseDisconnected = false;
      let sseErrorTimer = null;
      sse.addEventListener("open", () => {
        if (sseErrorTimer) { clearTimeout(sseErrorTimer); sseErrorTimer = null; }
        if (sseDisconnected) {
          sseDisconnected = false;
          setStatus("idle", nextTickLabel());
        }
      });
      sse.addEventListener("error", () => {
        if (sseErrorTimer || sseDisconnected) return;
        sseErrorTimer = setTimeout(() => {
          sseErrorTimer = null;
          sseDisconnected = true;
          setStatus("error", "Disconnected");
        }, 3000);
      });

      // Focus / visibility → ask the server to re-poll. Live mode only —
      // in Hourly / Daily / Manual the whole point is that refocusing the
      // tab learns nothing fresh, so the user can refocus freely and the
      // pull to compulsively check fades. Debounced 30s so a quick alt-tab
      // dance doesn't hammer GitHub; the manual refresh button shares the
      // window. fetch() rather than htmx.ajax because the swap (if any)
      // arrives over SSE, not via this response — we just want the side
      // effect.
      const FOCUS_REFRESH_MIN_MS = 30_000;
      let lastRefreshAt = 0;
      const maybeFocusRefresh = () => {
        if (autoMode() !== "live") return;
        if (document.visibilityState !== "visible") return;
        const dot = document.getElementById("status-dot");
        if (dot && dot.classList.contains("status-error")) return;
        const now = Date.now();
        if (now - lastRefreshAt < FOCUS_REFRESH_MIN_MS) return;
        lastRefreshAt = now;
        setStatus("loading", "Updating…");
        fetch("/refresh?auto=1", { method: "POST" })
          .then((r) => {
            if (sseDisconnected) return;  // SSE error wins until reconnect
            if (r.ok || r.status === 204) setStatus("idle", nextTickLabel());
          })
          .catch(() => {});
      };
      document.addEventListener("visibilitychange", maybeFocusRefresh);
      window.addEventListener("focus", maybeFocusRefresh);
      // Manual refresh clicks count against the same debounce.
      const refreshBtn = document.querySelector(".refresh-icon-btn");
      if (refreshBtn) {
        refreshBtn.addEventListener("click", () => { lastRefreshAt = Date.now(); });
      }

      // Keep the idle tooltip's countdown roughly current — every 30s,
      // re-render iff the pill is idle (don't stomp a loading flicker or a
      // sticky error). Also re-render immediately when the user picks a
      // new cadence in the Options dropdown; that event also resets
      // lastRefreshAt so the new mode's focus-refresh policy applies fresh.
      const refreshIdleTooltip = () => {
        const dot = document.getElementById("status-dot");
        if (dot && dot.classList.contains("status-idle")) {
          setStatus("idle", nextTickLabel());
        }
      };
      setInterval(refreshIdleTooltip, 30_000);
      window.addEventListener("autoRefreshChanged", () => {
        lastRefreshAt = 0;
        refreshIdleTooltip();
      });
      // Server-rendered initial title is a static placeholder; replace it
      // with the cadence-aware text now that <body> is parsed.
      refreshIdleTooltip();
    });

    // Plain-left-click on a popover trigger toggles its popover. Modifier
    // clicks (cmd/ctrl/shift/alt) and middle-click fall through to the
    // browser's native link behavior — for entity-name triggers (which are
    // <a href=...>), that opens GitHub in a new tab.
    //
    // The trigger sits *outside* the popover element, so clicking it while
    // the popover is open first runs the popover's light-dismiss (closing
    // it), *then* this handler. A naive togglePopover() here would re-open
    // what the light-dismiss just closed, so the trigger could never close
    // its own popover. Snapshot the open state on pointerdown (before the
    // light-dismiss fires) and use it to decide. (Native `popovertarget`
    // buttons don't need this — the UA coordinates invoker + light-dismiss.)
    let popoverTriggerWasOpen = false;
    document.addEventListener("pointerdown", (e) => {
      const trigger = e.target.closest("[data-popover-target]");
      const pop = trigger && document.getElementById(trigger.dataset.popoverTarget);
      popoverTriggerWasOpen = !!(pop && pop.matches(":popover-open"));
    });
    document.addEventListener("click", (e) => {
      const trigger = e.target.closest("[data-popover-target]");
      if (!trigger) return;
      if (e.button !== 0) return;
      if (e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return;
      e.preventDefault();
      const pop = document.getElementById(trigger.dataset.popoverTarget);
      if (!pop || typeof pop.showPopover !== "function") return;
      if (popoverTriggerWasOpen) { try { pop.hidePopover(); } catch (_) {} return; }
      pop.showPopover();
    });

    // Entity (person/repo/org) track toggles broadcast a single
    // entityTrackedChanged event. The originating row is updated by the
    // HTMX row-swap; this handler updates *every other* affected row's
    // entity-name triggers (warm-yellow tint via .is-tracked) and the
    // data-tracked-* row attribute the stripe CSS reads. Idempotent.
    const ENTITY_ROW_ATTR = { person: "author", repo: "repo", org: "org" };
    document.addEventListener("entityTrackedChanged", (e) => {
      const { kind, key, is_tracked } = e.detail;
      const rowAttr = ENTITY_ROW_ATTR[kind];
      if (!rowAttr) return;
      const escaped = CSS.escape(key);
      // Entity-name triggers of this kind referencing this key.
      document.querySelectorAll(
        `[data-tracked-trigger][data-kind="${kind}"][data-key="${escaped}"]`
      ).forEach((el) => {
        el.classList.toggle("is-tracked", is_tracked);
      });
      // Rows whose author/repo/org matches — drives the subtle row stripe.
      // dataset key shape: data-tracked-author → tracked + Author camelCase.
      const datasetKey =
        "tracked" + rowAttr.charAt(0).toUpperCase() + rowAttr.slice(1);
      document.querySelectorAll(
        `tr[data-${rowAttr}="${escaped}"]`
      ).forEach((tr) => {
        tr.dataset[datasetKey] = String(is_tracked);
      });
    });

    // Preserve which popovers are open (and any unsaved typing) across
    // full-table refreshes. Without this, the visibilitychange auto-refresh
    // would dismiss whatever popover the user has open mid-edit. Scoped to
    // #notifications-table swaps — per-row swaps (track, mark-read)
    // legitimately close the popover because the originating action is done.
    let popoverSnapshot = null;
    document.addEventListener("htmx:beforeSwap", (e) => {
      const tgt = e.detail.target;
      if (!tgt || tgt.id !== "notifications-table") return;
      popoverSnapshot = [];
      tgt.querySelectorAll(".action-popover").forEach((p) => {
        if (!p.matches(":popover-open")) return;
        const ta = p.querySelector("textarea");
        const focused = ta === document.activeElement;
        popoverSnapshot.push({
          threadId: p.dataset.threadId,
          kind: p.dataset.kind,
          dirty: ta && ta.value !== ta.defaultValue ? ta.value : null,
          focused,
          selStart: focused && ta ? ta.selectionStart : 0,
          selEnd: focused && ta ? ta.selectionEnd : 0,
        });
      });
    });
    document.addEventListener("htmx:afterSwap", (e) => {
      const tgt = e.detail.target;
      if (!tgt || tgt.id !== "notifications-table" || !popoverSnapshot) return;
      for (const s of popoverSnapshot) {
        if (!s.threadId) continue;
        const pop = tgt.querySelector(
          `.action-popover[data-thread-id="${CSS.escape(s.threadId)}"]` +
          `[data-kind="${s.kind}"]`
        );
        if (!pop || typeof pop.showPopover !== "function") continue;
        try { pop.showPopover(); } catch (_) {}
        const ta = pop.querySelector("textarea");
        if (!ta) continue;
        if (s.dirty !== null) {
          ta.value = s.dirty;
          // New textarea has no HTMX debounce timer running, so nudge a save
          // so an unsaved edit doesn't just sit there until the next keystroke.
          const url = ta.closest("form")?.getAttribute("hx-post");
          if (url) {
            const data = new FormData();
            data.append("note_user", s.dirty);
            fetch(url, { method: "POST", body: data, keepalive: true });
          }
        }
        if (s.focused) {
          ta.focus();
          try { ta.setSelectionRange(s.selStart, s.selEnd); } catch (_) {}
        }
      }
      popoverSnapshot = null;
    });

    // Sync the filter form state into the URL bar so any filter
    // composition is a bookmarkable view. Browser bookmarks become the
    // "saved views" mechanism: bookmark = save, rename = browser-side,
    // delete = remove bookmark. No separate save/rename/delete UI ships
    // in the app.
    //
    // replaceState (not pushState) means a flurry of filter toggles
    // doesn't pollute back-button history — back/forward still navigate
    // between actual page visits.
    //
    // Event delegation on document so it works across HTMX swaps and
    // before the form is in the DOM.
    const syncFiltersToUrl = (form) => {
      const params = new URLSearchParams();
      for (const [k, v] of new FormData(form)) {
        if (v === "" || v === null) continue;
        // sort=updated is the default — strip so the canonical "no
        // overrides" URL is just '/', and so it matches the Inbox
        // preset URL when comparing in detectActivePreset.
        if (k === "sort" && v === "updated") continue;
        params.append(k, v);
      }
      const qs = params.toString();
      history.replaceState(null, "", qs ? `?${qs}` : location.pathname);
      syncPresetHrefs();
      detectActivePreset();
    };
    const onFilterEvent = (e) => {
      // Pick up both DOM-descendant inputs and form-associated controls
      // (e.g. the Repo select that lives in the presets row but is bound
      // to the form via form="filters").
      let form = e.target.form;
      if (!form || form.id !== "filters") {
        form = e.target.closest && e.target.closest("#filters");
      }
      if (form && form.id === "filters") syncFiltersToUrl(form);
    };
    document.addEventListener("change", onFilterEvent);
    document.addEventListener("input", onFilterEvent);

    // AI composer: keyboard shortcuts + button-state syncing. The default
    // act is a free "Note" (no AI call); sending to the AI is the deliberate
    // Ctrl+Enter — the asymmetry matches the cost asymmetry (~0.5¢ + latency
    // per judgment vs. zero for a note the AI picks up next time it judges).
    //
    //   Enter        → click the Note button (post text as a user_chat event)
    //   Ctrl+Enter   → click the AI button: re-judge, posting any text in the
    //                  textarea as a user_chat event first (the AI replies in
    //                  the verdict's optional `reply` field only if warranted)
    //   Shift+Enter  → default newline (no shortcut handling)
    //
    // Note is disabled when the textarea is empty; the AI button's label
    // switches between "↻ Re-ask" (empty) and "Send to AI" (has text).
    // aiChatInput() also gets called from the Note button's
    // hx-on::after-request after a successful POST so the disabled state and
    // label resync once the textarea has been cleared.
    window.aiChatKeydown = function (e) {
      if (e.key !== "Enter" || e.shiftKey || e.isComposing) return;
      const popover = e.target.closest(".ai-verdict-popover");
      if (!popover || popover.classList.contains("busy")) return;
      e.preventDefault();
      const sel = (e.ctrlKey || e.metaKey) ? ".ai-rejudge-btn" : ".ai-send-btn";
      const btn = popover.querySelector(sel);
      if (btn && !btn.disabled) btn.click();
    };

    // Visual busy state for AI requests fired from inside the popover.
    // Adds .busy on the popover so CSS dims + pulses the controls and the
    // keyboard handler bails. For Note (timeline append, no row swap) we
    // remove it on after-request and clear the textarea on success. For the
    // AI button (Re-ask / Send to AI — full row swap), the popover element
    // itself is replaced — the new instance has no .busy class, and a
    // separate beforeSwap/afterSwap handler re-opens it (see below) so the
    // conversation stays visible.
    window.aiBusyOn = function (btn) {
      btn.closest(".ai-verdict-popover")?.classList.add("busy");
    };
    window.aiSendAfterRequest = function (btn, evt) {
      btn.closest(".ai-verdict-popover")?.classList.remove("busy");
      if (evt.detail.successful) {
        const ta = btn.closest("form").querySelector("textarea");
        ta.value = "";
        aiChatInput({ target: ta });
      }
    };

    // Keep the AI popover open across the row swaps that judgments
    // trigger (Send to AI, Re-ask). The general per-row handler
    // intentionally lets popovers close because most per-row swaps come
    // from "the action is done" buttons (mark read, mute) — but the AI
    // popover hosts an ongoing conversation, so closing it mid-flow loses
    // the user's place. Approve / Dismiss buttons still call hidePopover()
    // synchronously, so by the time beforeSwap runs the popover isn't
    // open and the snapshot is null — they close cleanly.
    let aiPopoverPreserve = null;
    document.addEventListener("htmx:beforeSwap", (e) => {
      const open = document.querySelector(".ai-verdict-popover:popover-open");
      aiPopoverPreserve = open ? open.dataset.threadId : null;
    });
    document.addEventListener("htmx:afterSwap", (e) => {
      if (!aiPopoverPreserve) return;
      const id = aiPopoverPreserve;
      aiPopoverPreserve = null;
      const pop = document.querySelector(
        `.ai-verdict-popover[data-thread-id="${CSS.escape(id)}"]`
      );
      if (pop && typeof pop.showPopover === "function") {
        try { pop.showPopover(); } catch (_) {}
      }
    });
    window.aiChatInput = function (e) {
      const ta = e.target;
      const popover = ta.closest(".ai-verdict-popover");
      if (!popover) return;
      const hasText = ta.value.trim().length > 0;
      const send = popover.querySelector(".ai-send-btn");
      if (send) send.disabled = !hasText;
      // Two invocation modes share the rejudge button. Empty textarea →
      // re-evaluate ("↻ Re-ask"). Text present → chat: send the message and
      // re-judge ("Send to AI"). Just the label changes; the button is
      // purple (the AI accent) in both states.
      const rejudgeLabel = popover.querySelector(".ai-rejudge-btn .rejudge-label");
      if (rejudgeLabel) {
        const initial = rejudgeLabel.dataset.initial || rejudgeLabel.textContent;
        rejudgeLabel.dataset.initial = initial;
        rejudgeLabel.textContent = hasText ? "Send to AI" : initial;
      }
    };

    // Per-kind mute toggle. The POST is hx-swap="none" (the row's rendering
    // depends on muted_kinds only via the ▾ caret tint and the in-menu cues),
    // so reconcile those client-side and keep the menu open for several toggles.
    window.muteKindToggled = function (btn) {
      btn.classList.toggle("on");
      const on = btn.classList.contains("on");
      // This option's purple cue means "still mismatches the AI's suggestion":
      // a suggested mute that isn't applied, or a suggested unmute that is.
      const want = btn.dataset.aiSuggest;  // "mute" | "unmute" | undefined
      if (want) {
        btn.classList.toggle("ai-mute",   want === "mute"   && !on);
        btn.classList.toggle("ai-unmute", want === "unmute" &&  on);
      }
      const pop = btn.closest(".mutekind-pop");
      if (!pop) return;
      const id = pop.id.replace(/^pop-mutekinds-/, "");
      const caret = document.getElementById("mk-caret-" + id);
      if (caret) caret.classList.toggle("has-muted", !!pop.querySelector(".mutekind-opt.on"));
      const anyPending = !!pop.querySelector(".mutekind-opt.ai-mute, .mutekind-opt.ai-unmute");
      if (caret) caret.classList.toggle("ai-suggests", anyPending);
      const apply = pop.querySelector(".mutekind-apply");
      if (apply) {
        apply.disabled = !anyPending;
        apply.classList.toggle("done", !anyPending);
      }
    };

    // Preset tab active-state detection. Normalize both the live URL and
    // each tab's href into a sorted, default-stripped string, then mark
    // the matching tab. Uses the tab's own href as the source of truth
    // so the JS doesn't need a copy of the preset table.
    const normalizeSearch = (search) => {
      const entries = [];
      for (const [k, v] of new URLSearchParams(search)) {
        if (v === "" || v === null) continue;
        if (k === "sort" && v === "updated") continue;
        // Owner / Repo are intentionally excluded from preset matching:
        // they're orthogonal scope ("Hot in repo X" should still light
        // up Hot).
        if (k === "owner" || k === "repo") continue;
        entries.push(`${k}=${encodeURIComponent(v)}`);
      }
      entries.sort();
      return entries.join("&");
    };
    const detectActivePreset = () => {
      const cur = normalizeSearch(location.search);
      document.querySelectorAll(".preset-tab").forEach((tab) => {
        // Use dataset.baseHref (set by syncPresetHrefs) so the live
        // ?repo= query a click would carry doesn't break the match.
        const ref = tab.dataset.baseHref || tab.getAttribute("href");
        const tabSearch = new URL(ref, location.origin).search;
        tab.classList.toggle("active", normalizeSearch(tabSearch) === cur);
      });
    };
    // Splice the live repo selection into every preset tab's href so
    // clicking one preserves the current scope. The repo lives outside
    // the preset (it's orthogonal), but a preset click without this
    // would navigate to a static URL with no repo and clear it.
    const syncPresetHrefs = () => {
      const params = new URLSearchParams(location.search);
      const owner = params.get("owner");
      const repo = params.get("repo");
      document.querySelectorAll(".preset-tab").forEach((tab) => {
        if (!tab.dataset.baseHref) {
          tab.dataset.baseHref = tab.getAttribute("href");
        }
        const base = tab.dataset.baseHref;
        const extra = [];
        if (owner) extra.push(`owner=${encodeURIComponent(owner)}`);
        if (repo)  extra.push(`repo=${encodeURIComponent(repo)}`);
        if (!extra.length) {
          tab.setAttribute("href", base);
        } else {
          const sep = base.includes("?") ? "&" : "?";
          tab.setAttribute("href", `${base}${sep}${extra.join("&")}`);
        }
      });
    };
    // Run once after the DOM exists so the active tab lights up on load.
    // Brief flash of "no tab active" between HTML parse and this firing
    // is acceptable on localhost.
    document.addEventListener("DOMContentLoaded", () => {
      syncPresetHrefs();
      detectActivePreset();
    });

    // bfcache restoration: when a page comes back from the back-forward
    // cache, the in-memory DOM is restored — for our table that means
    // pre-save textarea state with no real server fetch. Force a real
    // reload so the user sees the server's truth.
    window.addEventListener("pageshow", (e) => {
      if (e.persisted) location.reload();
    });

    // Flush dirty note textareas on tab close / reload / navigation.
    // sendBeacon is the browser-native API for fire-and-forget POSTs that
    // survive page unload (regular fetch/XHR may be cancelled mid-flight).
    window.addEventListener("pagehide", () => {
      document.querySelectorAll(".action-popover form").forEach((form) => {
        const ta = form.querySelector("textarea");
        if (!ta) return;
        if (ta.value === ta.defaultValue) return;
        const url = form.getAttribute("hx-post");
        if (!url) return;
        const data = new FormData();
        data.append("note_user", ta.value);
        navigator.sendBeacon(url, data);
      });
    });
  </script>
</head>
<body data-event-seq="{{ event_seq|default(0) }}" data-auto-refresh="{{ auto_refresh|default('live') }}">
  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
