<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Eddy for GitHub</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='icon.svg') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='vendor/pico.min.css') }}">
  <script src="{{ url_for('static', filename='vendor/htmx.min.js') }}" defer></script>
  <style>
    /* Capture root body text color in a non-Pico variable so anchors can
       reach for the body color without fighting Pico's anchor-scoped
       --pico-color redefinition (Pico rebinds --pico-color to the link
       primary inside `a` selectors, which is fine for ordinary links but
       wrong when we want the anchor to read as content text). */
    :root {
      --content-color: var(--pico-color);
      /* Semantic accent + state palette — GitHub-ish hues named by role, so
         the literals live in one place. `-rgb` companions exist where a colour
         also appears as an alpha wash: rgba(var(--x-rgb), α). Greys still use
         Pico's --pico-*; the rgba(140,149,159,…) family is left as-is. */
      --ai-accent: #a371f7;          --ai-accent-rgb: 163, 113, 247;        /* AI affordances + suggestion rings */
      --accent-amber: #eaa54a;       --accent-amber-rgb: 234, 165, 74;      /* tracked / favorited / note (bright) */
      --accent-amber-deep: #bf8700;  --accent-amber-deep-rgb: 191, 135, 0;  /* same role, deeper — fills, badges */
      --accent-blue: #4493f8;        --accent-blue-rgb: 73, 147, 248;       /* "yours" / self / user-chat / info */
      --state-good: #1a7f37;         --state-good-rgb: 26, 127, 55;         /* approved · reopened · member · idle */
      --state-good-emphasis: #1f883d;                                       /* solid green bg (open-PR pill, confirm) */
      --state-good-muted: #5b8c64;                                          /* diff "+N" */
      --state-bad: #cf222e;          --state-bad-rgb: 207, 34, 46;          /* closed PR · error */
      --state-bad-muted: #a8676b;                                           /* changes-requested · closed lifecycle · diff "-N" */
      --state-merged: #8957e5;                                              /* terminal-positive purple — merged PR · answered */
    }
    main.container { max-width: 1400px; padding: 1rem 1.25rem 0; }
    table { font-size: 0.86rem; }
    th, td { vertical-align: middle; }
    /* Pico's default td padding is ~1rem vertical, which sets the floor on
       row height. Halve it so per-column padding-top overrides actually
       show up — bottom padding had been the hidden constraint. */
    table td { padding: 0.45rem 0.5rem; }
    /* Fixed width (a touch over the priority picker's min-width + cell
       padding): the column doesn't grow with content — the thread / AI
       pill's subtext ellipsizes to whatever fits. Keeps the title column
       from being squeezed. */
    td.status {
      white-space: normal;
      vertical-align: top;
      padding-top: 0.3rem;
      width: 13.5rem;
      max-width: 13.5rem;
      line-height: 1.3;
    }
    /* width:100% + max-width:0 is the classic table-cell ellipsis trick:
       the cell takes all remaining horizontal space (since other cells use
       width:1%), but the max-width forces descendant overflow rules to
       actually clip rather than grow the column. Without this, a long
       title elongates the table past the viewport. */
    td.title { width: 100%; max-width: 0; }

    /* Type spine — a rounded rect pinned at the left of the title cell,
       stretched to the cell's full (≈ two-line) height. Colour tracks
       GitHub state, not type (the .state-* rules below); the type icon +
       short label stack vertically inside it. */
    td.title .title-cell {
      display: flex;
      align-items: stretch;
      gap: 0.55rem;
      min-height: 2.45rem;
    }
    td.title .title-cell-body {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      /* Top-aligned: when a row has no meta-row, the second line stays
         reserved (the .title-cell min-height holds it) rather than the
         title floating to the vertical centre. */
      justify-content: flex-start;
    }
    .type-spine {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.2rem;
      width: 1.9rem;   /* fixed — every type spine the same width regardless of label */
      padding: 0.15rem 0.2rem;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 0.35rem;
      font-size: 0.52rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      line-height: 1;
      text-transform: uppercase;
      white-space: nowrap;
      color: white;
      background: #6e7781; /* default for Discussion / Release / not-yet-enriched */
    }
    .type-spine-label { line-height: 1; }
    .type-spine .type-icon {
      display: block;
      width: 1.17rem;
      height: 1.17rem;
    }

    /* Activity column ("Reception" / "Age") — age pill on top, then a 2-col
       stat grid: popularity (▲ ▼) | engagement (👥). AI mode collapses it to
       the age alone (.ai-mode below) — reception "temperature" is the AI's
       to weigh — except the engaged-count returns while sorting by it.
       Vertical-centered; pills avoided on count rows — they read as noise
       when their width fluctuates with single-digit numbers. */
    td.activity {
      width: 1%;
      white-space: nowrap;
      vertical-align: middle;
      padding: 0.3rem 0.5rem;
      text-align: center;
      font-size: 0.78rem;
    }
    td.activity .activity-stats {
      display: inline-grid;
      grid-template-columns: auto auto;
      gap: 0.25rem 0.7rem;
      line-height: 1.2;
      color: var(--pico-muted-color);
    }
    /* Stats carry their tooltip in [data-tip] (not [title]) precisely so
       this cursor rule doesn't flicker — the custom tooltip handler has
       to swap [title]↔[data-stashed-title] on hover to suppress the
       browser's native tooltip, and any [title]-keyed selector loses its
       match for one frame across that swap. [data-tip] stays put. */
    td.activity .activity-stats [data-tip],
    td.activity .activity-stats [data-tip] * { cursor: help; }
    /* Stat slot in the activity column. The slot keeps a min-width so
       icons line up across rows; the actual content lives inside an inner
       .stat-content wrapper that's content-sized and carries the tooltip,
       so hover targets only the visible glyphs (number + icon), not the
       padding the slot adds. */
    .stat {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
    }
    .stat-content {
      display: inline-flex;
      align-items: center;
      gap: 0.2rem;
    }
    /* Age pill has a text unit, not an icon — baseline-align so the small
       "h" / "mo" / "y" suffix sits on the same baseline as the number,
       reading as a single unit rather than two separated glyphs. */
    .age-pill .stat-content { align-items: baseline; gap: 0.1rem; }
    /* Tabular nums make 1-vs-2-digit counts line up vertically across rows;
       the column reads as a number column, not a ragged list. */
    .stat-num { font-variant-numeric: tabular-nums; }
    /* Unit suffix on the age pill — smaller and faded so the number is what
       the eye latches onto; the gradient color still carries through. */
    .stat-unit {
      font-size: 0.78em;
      opacity: 0.7;
      font-weight: 500;
    }
    .stat-icon {
      width: 1em;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    svg.stat-icon { height: 1em; }
    /* Diff stats — desaturated greens/reds so they read as factual metric,
       distinct from the saturated reaction sentiment colors below. The
       wrapper carries the hover tooltip (top-5 changed files); inline-flex
       restores the visual gap between +N and −M that the parent meta-row's
       gap would otherwise collapse since the two spans are now one item. */
    .diff-stats { display: inline-flex; gap: 0.4rem; }
    .stat-add { color: var(--state-good-muted); }
    .stat-del { color: var(--state-bad-muted); }
    /* Hover tooltip for .diff-stats: 3-col grid (path | +adds | −dels) so
       the count columns line up across rows. Path dims its directory portion
       and brightens the basename — GitHub-style "looks like a path" without
       the cost of a real tree. */
    .custom-tooltip .diff-tip-files {
      display: grid;
      grid-template-columns: 1fr auto auto;
      column-gap: 0.7rem;
      row-gap: 0.15rem;
      align-items: baseline;
    }
    /* Path is a flex row inside the grid cell. The dir prefix gets the
       ellipsis (flex-shrink:1 + overflow), the basename stays whole
       (flex-shrink:0) — same shape macOS Finder uses on a long path: lose
       the prefix before the meaningful end. min-width:0 on the cell is
       what lets the grid track actually shrink below content size. */
    .custom-tooltip .diff-tip-path {
      display: flex;
      min-width: 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.92em;
    }
    .custom-tooltip .diff-tip-dir {
      opacity: 0.55;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
      flex: 0 1 auto;
    }
    /* Trailing slash is its own non-shrinking span so a truncated dir still
       reads as a path ("src/com…/foo.py" not "src/com…foo.py"). */
    .custom-tooltip .diff-tip-sep {
      opacity: 0.55;
      white-space: nowrap;
      flex: 0 0 auto;
    }
    .custom-tooltip .diff-tip-base {
      color: #fff;
      white-space: nowrap;
      flex: 0 0 auto;
    }
    .custom-tooltip .diff-tip-files .stat-add,
    .custom-tooltip .diff-tip-files .stat-del {
      font-variant-numeric: tabular-nums;
      text-align: right;
    }
    .custom-tooltip .diff-tip-more {
      grid-column: 1 / -1;
      margin-top: 0.2rem;
      opacity: 0.7;
      font-style: italic;
    }
    /* "+N more" labels tooltip: same pills as the meta-row, just wrapped. */
    .custom-tooltip .labels-tip {
      display: flex;
      flex-wrap: wrap;
      gap: 0.2rem 0.25rem;
      max-width: 22rem;
    }
    td.activity .activity-stats .stat { min-width: 2.5rem; }
    /* Item creation age — spans both grid columns as a header so the 2x2
       reactions/comments grid below stays clean. Color comes inline from a
       log-mapped HSL gradient (see _age_pill in app/web.py). */
    td.activity .activity-stats .age-pill {
      grid-column: 1 / -1;
      min-width: 0;
      font-weight: 600;
      justify-content: center;
    }
    /* AI mode collapses this column to the age (plus the engaged-count when
       the active sort is "engaged"). No 2-col stat grid to keep aligned —
       single centered column. */
    td.activity .activity-stats.ai-mode { grid-template-columns: auto; }
    td.activity .activity-stats.ai-mode .stat {
      min-width: 0;
      grid-column: 1 / -1;
      justify-content: center;
    }
    .type-spine.state-open                { background: var(--state-good-emphasis); }
    .type-spine.state-draft               { background: #57606a; }
    .type-spine.state-merged,
    .type-spine.state-closed_completed,
    .type-spine.state-answered            { background: var(--state-merged); }
    .type-spine.state-closed_pr           { background: var(--state-bad); }
    .type-spine.state-closed,
    .type-spine.state-closed_not_planned  { background: #6e7781; }
    /* Open discussions read grey, not "open = green" — matches github.com,
       where an open discussion is a neutral conversation, not a tracked
       work item. Closed/answered keep their state colour above. */
    .type-spine.type-discussion.state-open { background: #6e7781; }

    /* repo cell — owner above, name below, author below that, all clickable.
       Pinned to 11rem on all three width axes so the column doesn't reflow
       when filters change which cells are visible. width alone is only a
       preferred-width hint in auto table layout; min-width is the hard floor
       that survives "no visible cell needs 11rem". Long content truncates
       per-line (see .repo-owner / .repo-name / .author-login below). */
    .repo-col, td.repo { width: 11rem; min-width: 11rem; max-width: 11rem; }
    td.repo { line-height: 1.1; padding-right: 1rem; }
    td.repo a { text-decoration: none; }
    td.repo a:hover { text-decoration: underline; }
    .repo-line {
      display: flex;
      align-items: baseline;
      gap: 0.3rem;
      position: relative;
    }
    /* Owner/name/author all truncate with an ellipsis rather than wrap onto
       extra lines — the repo column has a fixed width and a row's vertical
       footprint should be predictable. Full text remains in the link's
       href + the popover, so nothing is hidden. */
    .repo-owner {
      font-size: 0.7rem;
      color: var(--pico-muted-color);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }
    /* Trailing slash signals "this owner contains the repo below" — turns
       the stacked owner/name into a directional path, distinguishing it
       from the indented author line below. */
    .repo-owner.entity-trigger::after {
      content: "/";
      opacity: 0.6;
    }
    .repo-name {
      font-size: 0.88rem;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }
    /* Author indents under the repo so it reads as item-attribution, not
       another segment of the owner/repo path. */
    .repo-author {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      margin-top: 0.1rem;
      padding-left: 0.45rem;
      font-size: 0.72rem;
      color: var(--pico-muted-color);
      position: relative;
    }
    .repo-author .author-by { opacity: 0.7; flex-shrink: 0; }
    .repo-author .author-login {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }
    .author-icon {
      width: 0.95em;
      height: 0.95em;
      flex-shrink: 0;
      cursor: help;
      vertical-align: -0.13em;
    }
    /* Inline timeline contexts — popover one-liners + the AI verdict
       bubble head — render the icon directly next to the login as
       inline content (vs the Repo column's flex layout which gets
       spacing from its parent's `gap`). Margin gives them breathing
       room so the icon doesn't crash into the name. */
    .ai-verdict-popover .author-icon { margin-right: 0.18rem; }
    .author-icon.icon-member    { color: var(--state-good); }
    .author-icon.icon-firsttime { color: var(--accent-amber-deep); }
    .author-icon.icon-self      { color: var(--accent-blue); }
    .author-icon.icon-generic   { opacity: 0.55; }

    /* Entity name = popover trigger. Reads as content (body color), not as
       a styled link — same readability fix as the item title. The repo-owner
       (org) stays muted because it's secondary context, not a primary scan
       target. Tracked state tint takes priority. Plain left-click opens the
       popover (intercepted in JS); middle/cmd-click navigates the link. */
    .entity-trigger { cursor: pointer; }
    a.entity-trigger { color: var(--content-color); }
    .repo-owner.entity-trigger { color: var(--pico-muted-color); }
    .author-login.entity-trigger { font-weight: 500; }
    .entity-trigger.is-tracked { color: var(--accent-amber); }
    /* Hover affordance — all three triggers respond the same way: lift to
       full body color (the org is muted at rest, so its plain underline is
       too faint to read as interactive on its own) and underline. Tracked
       entities keep their amber. No color transition: Pico animates `a`
       color over 0.2s, which lags behind the (non-animatable) underline and
       feels sluggish for a hover cue — snap both at once. */
    a.entity-trigger { transition: none; }
    .entity-trigger:hover { color: var(--pico-color); text-decoration: underline; }
    .entity-trigger.is-tracked:hover { color: var(--accent-amber); }
    /* Item title is the longest piece of free-text prose on the row, so it
       reads as text rather than as a styled link: inherits body color (NOT
       Pico's anchor-scoped --pico-color, which is the link primary blue —
       hence the explicit `inherit`), no underline at rest, hover gets the
       underline as the click affordance. Slight font-weight bump matches
       GitHub's content-link convention (bold-ish text, blue only on hover).
       Tracked-state tint takes priority over the default color. */
    /* Title is clamped to 1 line: text ellipsizes, full string lives in
       the title attribute (hover tooltip). inline-flex (vs flex) keeps
       the clickable area to the actual text — long titles still truncate
       via the inner .item-title-text overflow, but short titles don't
       have the link extend across the entire cell width. */
    a.item-title, span.item-title {
      color: var(--content-color);
      text-decoration: none;
      font-weight: 500;
      display: inline-flex;
      max-width: 100%;
      align-items: baseline;
      align-self: flex-start;     /* .title-cell-body is column flex; default stretch would extend the click area past the text */
      min-width: 0;
    }
    a.item-title .item-title-text,
    span.item-title .item-title-text {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
      pointer-events: none;       /* see .ai-verdict-desc — dodge Safari's clipped-text tooltip; clicks/hover fall through to the .item-title link */
    }
    a.item-title:hover .item-title-text { text-decoration: underline; }
    a.item-title.is-tracked,
    a.item-title.is-tracked:hover,
    span.item-title.is-tracked { color: var(--accent-amber); }

    /* Row-level highlights, in increasing priority:
         context-track: any of org/repo/author tracked → subtle warm-yellow
                                                         (1.5px, half-alpha)
         yours        : you authored this              → blue (3px)
         tracked      : item itself tracked            → solid warm-yellow (3px)
       Later rules override earlier ones because both write box-shadow on
       the same first-child cell. Context-track uses :not(...) on the rows
       above so a yours-row never gets demoted to subtle warm-yellow by an
       attribute-selector match. */
    tr[data-tracked-author="true"]:not(.is-tracked-row):not(.is-yours-row) td:first-child,
    tr[data-tracked-repo="true"]:not(.is-tracked-row):not(.is-yours-row) td:first-child,
    tr[data-tracked-org="true"]:not(.is-tracked-row):not(.is-yours-row) td:first-child {
      box-shadow: inset 1.5px 0 0 rgba(var(--accent-amber-rgb), 0.55);
    }
    tr.is-yours-row td:first-child   { box-shadow: inset 3px 0 0 var(--accent-blue); }
    tr.is-tracked-row td:first-child { box-shadow: inset 3px 0 0 var(--accent-amber); }

    /* Action popover panel — shared chrome for org / repo / person / item.
       Anchored below its trigger via CSS Anchor Positioning (anchor-name on
       the trigger, position-anchor here). Falls back to default popover
       placement on browsers that don't support anchor positioning yet. */
    .action-popover[popover] {
      /* Reset UA defaults so anchor positioning is the only thing placing it. */
      inset: auto;
      margin: 0;
      padding: 0.45rem 0.55rem;
      border: 1px solid var(--pico-muted-border-color);
      border-radius: 0.4rem;
      background: var(--pico-card-background-color);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.18);
      min-width: 17rem;
      max-width: 24rem;
      font-size: 0.78rem;
      color: var(--pico-color);
    }
    .action-popover[popover]:popover-open {
      position-area: bottom span-right;
      margin-top: 0.3rem;
      position-try-fallbacks: flip-block, flip-inline, flip-block flip-inline;
    }
    .action-popover .popover-title {
      margin-bottom: 0.35rem;
      font-size: 0.78rem;
    }
    .action-popover .popover-kind {
      font-size: 0.62rem;
      color: var(--pico-muted-color);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-right: 0.3rem;
    }
    .action-popover .popover-name {
      color: var(--pico-color);
      font-weight: 600;
      text-decoration: none;
    }
    .action-popover .popover-name:hover { text-decoration: underline; }
    .action-popover .popover-track-btn {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      width: 100%;
      text-align: left;
      background: none;
      border: 1px solid var(--pico-muted-border-color);
      border-radius: 0.3rem;
      padding: 0.18rem 0.45rem;
      margin: 0 0 0.35rem;
      font-size: 0.74rem;
      line-height: 1.4;
      cursor: pointer;
      color: var(--pico-color);
    }
    .action-popover .popover-track-btn:hover { background: rgba(140, 149, 159, 0.12); }
    .action-popover .popover-track-btn .track-icon {
      width: 0.95em;
      height: 0.95em;
      flex-shrink: 0;
      color: var(--accent-amber);
    }
    .action-popover form { margin: 0 0 0.35rem; }
    .action-popover textarea {
      width: 100%;
      margin: 0;
      font-size: 0.78rem;
      min-height: 2.6rem;
      padding: 0.3rem 0.45rem;
    }
    /* title meta-row — discussion category, PR diff (if any), and labels
       share one wrapping line so they fit when narrow but stay grouped when
       wide. (The type lives in the .type-spine to the left, not here.) */
    td.title .meta-row {
      font-size: 0.74rem;
      color: var(--pico-muted-color);
      margin-top: 0.3rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      align-items: center;
      /* Fixed line height regardless of which chips are present (plain vs.
         bordered pills, the 0.74rem diff-stats, the empty placeholder all
         differ slightly) — keeps the title cell, and so the .type-spine
         stretched to it, a constant height row to row. Many labels still
         wrap and grow it, which is fine. */
      min-height: 1rem;
    }
    .icon {
      width: 0.95em;
      height: 0.95em;
      vertical-align: -0.13em;
      flex-shrink: 0;
    }
    .label-pill {
      display: inline-block;
      padding: 0.02rem 0.4rem;
      border-radius: 0.5rem;
      font-size: 0.62rem;
      font-weight: 500;
      line-height: 1.45;
      white-space: nowrap;
      opacity: 0.9;
    }
    /* Discussion category — sibling of .label-pill, sized identically so it
       slots into the same meta-row. GraphQL exposes no color for categories,
       so the pill is neutral; the outline + muted text keep it visually
       distinct from user-colored labels. */
    .category-pill {
      display: inline-block;
      padding: 0.02rem 0.4rem;
      border-radius: 0.5rem;
      font-size: 0.62rem;
      font-weight: 500;
      line-height: 1.45;
      white-space: nowrap;
      border: 1px solid var(--pico-muted-border-color);
      color: var(--pico-muted-color);
    }
    .label-more {
      font-size: 0.62rem;
      color: var(--pico-muted-color);
      cursor: help;
      padding: 0 0.2rem;
    }
    /* Placeholder when a row has no category / diff / labels — keeps the
       meta-row line occupied (so the title stays top-aligned with a real
       second line) without implying any tag. Dashed outline, no fill. */
    .meta-empty {
      display: inline-block;
      padding: 0.02rem 0.4rem;
      border-radius: 0.5rem;
      font-size: 0.62rem;
      line-height: 1.45;
      white-space: nowrap;
      border: 1px dashed currentColor;
      color: color-mix(in srgb, var(--pico-muted-color) 65%, transparent);
    }

    /* actions — two rows on orthogonal axes:
         Row 1 (segmented): Mark read | Snooze | Done — disposition while
           subscribed (left→right releases the user's commitment to
           revisit). Green for "read but visible" (Mark read), amber for
           "archived w/ timer" (Snooze; grey when also unsubscribed) and
           "archived" (Done).
         Row 2 (standalone toggles): Track · Mute · ▾ — subscription
           posture. Track wears amber when bookmarked; Mute wears red
           ("archived and never come back" — also archives, so it's
           mutually exclusive with row 1's three); ▾ wears amber
           `has-muted` for the partial-mute state.
       The "active" segment is a filled tint, not an icon — the fill
       itself signals "you're here". Only one of the four hide-states
       (Done, Snooze, Mute, or none) is ever active at once. */
    td.actions { white-space: nowrap; width: 1%; vertical-align: middle; }
    td.actions .action-group {
      display: flex;
      background: rgba(140, 149, 159, 0.08);
      border: 1px solid var(--pico-muted-border-color);
      border-radius: 0.4rem;
      overflow: hidden;
    }
    td.actions .action-segment {
      background: none;
      border: none;
      margin: 0;
      padding: 0.15rem 0.55rem;
      cursor: pointer;
      line-height: 1;
      color: var(--pico-muted-color);
      text-align: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    td.actions .action-segment svg {
      width: 0.9rem;
      height: 0.9rem;
      display: block;
    }
    td.actions .action-segment + .action-segment {
      border-left: 1px solid var(--pico-muted-border-color);
    }
    td.actions .action-segment:hover {
      background: rgba(140, 149, 159, 0.18);
      color: var(--pico-color);
    }
    td.actions .action-segment.active {
      font-weight: 600;
      color: var(--pico-color);
    }
    td.actions .action-segment.seg-ignore.active {
      background: rgba(var(--state-good-rgb), 0.22);   /* muted green — read, visible */
    }
    td.actions .action-segment.seg-done.active {
      background: rgba(var(--accent-amber-deep-rgb), 0.26);   /* amber — archived */
    }
    td.actions .action-segment.seg-snooze.active {
      background: rgba(var(--accent-amber-deep-rgb), 0.26);   /* amber — archived w/ timer */
      color: var(--pico-color);
    }
    /* Quiet snooze (also unsubscribed) — muted grey, not amber: it's not a
       live timer waiting on activity, just a parked thread. */
    td.actions .action-segment.seg-snooze.active.quiet {
      background: rgba(140, 149, 159, 0.24);
    }

    /* Row 2 of the Actions cell — Track · Mute · ▾. Three standalone toggles
       on the subscription-posture axis; each wears the segmented-control's
       slot background (faint grey box, filled tint when on) so they read as
       toggles. Mute and ▾ form the unsubscribe pair (full / partial). */
    td.actions .action-row2 {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      margin-top: 0.15rem;
    }
    td.actions .row2-btn {
      border: 1px solid var(--pico-muted-border-color);
      border-radius: 0.4rem;
      margin: 0;
      padding: 0.13rem 0.39rem;
      cursor: pointer;
      line-height: 1;
      color: var(--pico-muted-color);
      display: inline-flex;
      align-items: center;
      gap: 0.18rem;
      font-size: 0.6rem;
      white-space: nowrap;
      background: rgba(140, 149, 159, 0.08);   /* slot background, like .action-group */
    }
    td.actions .row2-btn svg { width: 0.9rem; height: 0.9rem; display: block; }
    td.actions .row2-btn:hover { background: rgba(140, 149, 159, 0.18); color: var(--pico-color); }
    /* Track — amber when bookmarked. */
    td.actions .track-btn.active {
      background: rgba(var(--accent-amber-rgb), 0.20);
      color: var(--accent-amber);
    }
    /* Mute — red when fully unsubscribed (also archived). Mutually exclusive
       with row 1's active states. */
    td.actions .mute-btn.active {
      background: rgba(var(--state-bad-rgb), 0.22);
      color: var(--pico-color);
      font-weight: 600;
    }
    /* Mute + ▾ joined sub-group — share a single border + slot background
       (like row 1's .action-group). The child buttons drop their own borders
       and radii; a hairline divider separates them. overflow:hidden clips
       child backgrounds to the rounded corner, so Mute's red `active` and ▾'s
       amber `has-muted` fills paint inside the group's outline. */
    td.actions .row2-group {
      display: inline-flex;
      background: rgba(140, 149, 159, 0.08);
      border: 1px solid var(--pico-muted-border-color);
      border-radius: 0.4rem;
      overflow: hidden;
      margin-left: auto;   /* push to the right edge, away from Track */
    }
    td.actions .row2-group .row2-btn {
      border: none;
      border-radius: 0;
      background: none;
    }
    td.actions .row2-group .row2-btn + .row2-btn {
      border-left: 1px solid var(--pico-muted-border-color);
    }
    /* ▾ caret — narrower than the icon button next to it; amber `has-muted`
       marks the partial-mute state (some kinds silenced), distinct from
       Mute's red. */
    td.actions .mute-caret-btn {
      padding: 0.13rem 0.38rem;
      font-size: 0.62rem;
    }
    td.actions .mute-caret-btn.has-muted {
      background: rgba(var(--accent-amber-deep-rgb), 0.18);
      color: var(--accent-amber-deep);
    }
    /* Inline ▾ after an icon — signals "opens a menu" on a button that's
       not part of a sibling-caret pattern. Used on the Snooze trigger. */
    td.actions .action-segment .disclosure {
      font-size: 0.62rem;
      line-height: 1;
      margin-inline-start: 0.1rem;
      opacity: 0.7;
    }

    /* Snooze duration menu — a native [popover] anchored to its trigger
       (no Pico <details> box to override). Sized like a compact menu. */
    /* Don't set `display` here — the UA's `[popover]:not(:popover-open)
       { display:none }` would lose the specificity tie to an author rule
       and the menu would show by default. Block layout + width:100% buttons
       stack fine when open. */
    .snooze-pop[popover] {
      inset: auto;
      margin: 0;
      padding: 0.2rem;
      border: 1px solid var(--pico-muted-border-color);
      border-radius: 0.4rem;
      background: var(--pico-card-background-color);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.18);
      min-width: 6rem;
    }
    .snooze-pop[popover]:popover-open {
      position-area: bottom span-right;
      margin-top: 0.25rem;
      position-try-fallbacks: flip-block, flip-inline, flip-block flip-inline;
    }
    .snooze-pop button {
      display: block;
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      border-radius: 0.25rem;
      margin: 0;
      padding: 0.22rem 0.45rem;
      font-size: 0.74rem;
      line-height: 1.3;
      color: var(--pico-color);
      cursor: pointer;
    }
    .snooze-pop button:hover { background: rgba(140, 149, 159, 0.16); }
    .snooze-pop .snooze-ai {
      font-weight: 600;
      color: var(--ai-accent);   /* matches the AI brain accent */
      margin-bottom: 0.15rem;
      padding-bottom: 0.25rem;
      border-bottom: 1px solid var(--pico-muted-border-color);
    }
    /* "unsubscribe while snoozed" — a ✓-toggle row like the Options menu's:
       muted label, white when on; the duration buttons read its .on class. */
    .snooze-pop .snooze-quiet-opt {
      margin-top: 0.15rem;
      padding-top: 0.3rem;
      border-top: 1px solid var(--pico-muted-border-color);
      font-size: 0.7rem;
      color: var(--pico-muted-color);
      white-space: nowrap;
    }
    .snooze-pop .snooze-quiet-opt .check { visibility: hidden; margin-inline-end: 0.15rem; }
    .snooze-pop .snooze-quiet-opt.on { color: var(--pico-color); }
    .snooze-pop .snooze-quiet-opt.on .check { visibility: visible; }

    /* Purple dotted inset ring — the AI *suggests* this action / subscription
       change and the user hasn't done it yet. Dashed (not solid) so it reads
       as a hint, not a state. Goes on whichever Actions-column control matches
       the verdict (Mark read / Done / Mute / Snooze / Track / the ▾ caret) and
       composes with the control's own state styling (e.g. amber has-muted +
       ring). Cleared once it's in effect, so it always reads "act on this",
       never "undo this" or "this is special". outline (not box-shadow) to get
       the dotted style; negative offset tucks it inside the button edge so
       overflow:hidden on .action-group / neighbouring segment borders don't
       eat it. */
    td.actions .action-segment.ai-suggests,
    td.actions .row2-btn.ai-suggests {
      outline: 1.5px dashed rgba(var(--ai-accent-rgb), 0.85);
      outline-offset: -2px;
    }
    .mutekind-pop .mutekind-title {
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--pico-muted-color);
      padding: 0.1rem 0.45rem 0.2rem;
      margin-bottom: 0.1rem;
      border-bottom: 1px solid var(--pico-muted-border-color);
    }
    /* .mutekind-opt inherits .snooze-pop button (block, full-width, left). The
       leading slot keeps the checked ✓ from shifting the labels. */
    .mutekind-pop .mutekind-opt::before {
      content: "";
      display: inline-block;
      width: 1em;
      margin-right: 0.15rem;
    }
    /* ✕ (not ✓) + struck label — the marked state means "this kind is
       silenced on this thread", not "enabled". The ✕ glyph lives outside
       .mk-lbl so the strike line doesn't run through it. */
    .mutekind-pop .mutekind-opt.on::before { content: "✕"; }
    .mutekind-pop .mutekind-opt.on .mk-lbl { text-decoration: line-through; }
    /* The non-mutable `lifecycle` row — a <div>, so it needs the .snooze-pop
       button layout spelled out; greyed and not clickable. */
    .mutekind-pop .mutekind-opt.always-on {
      display: block;
      width: 100%;
      padding: 0.22rem 0.45rem;
      font-size: 0.74rem;
      line-height: 1.3;
      color: var(--pico-muted-color);
      cursor: default;
    }
    /* Purple dashed ring — this option still mismatches the AI's suggestion
       (a suggested mute not yet applied, or a suggested unmute that still is).
       Dashed = hint, not state; goes away on click once state matches. AI mode
       only. */
    .mutekind-pop .mutekind-opt.ai-mute,
    .mutekind-pop .mutekind-opt.ai-unmute {
      outline: 1.5px dashed rgba(var(--ai-accent-rgb), 0.7);
      outline-offset: -2px;
    }
    /* ✦ apply-the-AI's-subscription-suggestion row (inherits .snooze-pop
       button layout). Purple while there's something to apply; greyed once
       it's done (the JS flips .done + disabled in lockstep with the options). */
    .mutekind-pop .mutekind-apply {
      color: var(--ai-accent);
      font-weight: 600;
      border-bottom: 1px solid var(--pico-muted-border-color);
      margin-bottom: 0.1rem;
      padding-bottom: 0.25rem;
    }
    .mutekind-pop .mutekind-apply:hover { background: rgba(var(--ai-accent-rgb), 0.14); }
    .mutekind-pop .mutekind-apply.done,
    .mutekind-pop .mutekind-apply:disabled {
      color: var(--pico-muted-color);
      font-weight: normal;
      cursor: default;
    }
    .mutekind-pop .mutekind-apply:disabled:hover { background: none; }

    /* AI verdict pill. Lives in the Relevance column when triage mode =
       AI. Full-width strip stacked directly above the priority picker so
       the two read as one structural pair. Left = sparkle glyph + a muted,
       truncated echo of the verdict's description (full text on hover / in
       the popover); the suggested action isn't spelled out here — it shows
       as purple rings on the Actions column. Clicking opens the popover
       timeline. Right = the assess / re-assess trigger. Purple framing is
       the AI identity — priority lives entirely in the picker below, so the
       strip carries no priority tint. Advisory; nothing auto-applies. */
    .ai-verdict-pill-group {
      display: flex;
      width: 100%;
      margin: 0 0 0.25rem;
      background: rgba(var(--ai-accent-rgb), 0.08);
      border: 1px solid rgba(var(--ai-accent-rgb), 0.30);
      border-radius: 0.4rem;
      overflow: hidden;
    }
    /* Outdated: a verdict exists but new activity (or a re-poll) landed
       after it. Dashed border signals "this take is behind the thread";
       its echoes in the Actions column (the dashed rings) dim a touch
       more — they read "maybe, re-ask first" rather than "do this now".
       Re-ask makes it crisp again. */
    .ai-verdict-pill-group.outdated {
      border-style: dashed;
      opacity: 0.85;
    }
    tr.ai-outdated td.actions .action-segment.ai-suggests,
    tr.ai-outdated td.actions .row2-btn.ai-suggests { outline-color: rgba(var(--ai-accent-rgb), 0.55); }
    .ai-verdict-main,
    .ai-verdict-rerun {
      background: none;
      border: none;
      margin: 0;
      cursor: pointer;
      font-size: 0.66rem;
      font-weight: 600;
      line-height: 1.4;
      color: var(--pico-color);
    }
    .ai-verdict-main {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: baseline;
      gap: 0.3rem;                /* sparkle icon → description echo */
      padding: 0.14rem 0.5rem;
      letter-spacing: 0.01em;
      border-right: 1px solid rgba(var(--ai-accent-rgb), 0.30);
    }
    .ai-verdict-take {
      flex-shrink: 0;
      white-space: nowrap;
    }
    .ai-verdict-desc {
      flex: 1;
      min-width: 0;               /* lets the ellipsis trigger */
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 400;
      color: var(--pico-muted-color);
      /* Safari pops a native tooltip for ellipsis-clipped text; let hovers
         fall through to the button so only its data-tip-html tooltip shows. */
      pointer-events: none;
    }
    .ai-verdict-rerun {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.14rem 0.4rem;
      color: var(--ai-accent);  /* purple "run the AI" affordance */
    }
    .ai-verdict-rerun svg { width: 0.82rem; height: 0.82rem; }
    .ai-verdict-rerun.current,
    .ai-verdict-rerun:disabled {
      cursor: default;
      opacity: 1;                       /* override Pico's disabled-button dimming */
      color: var(--pico-muted-color);   /* greyed — assessment is current, nothing to do */
    }
    .ai-verdict-main:hover,
    .ai-verdict-rerun:not(.current):hover { background: rgba(var(--ai-accent-rgb), 0.13); }
    /* AI sparkle leading the take label. */
    .ai-verdict-pill-group .ai-pill-icon {
      width: 0.85em;
      height: 0.85em;
      margin-right: 0.3rem;
      vertical-align: -0.12em;
      color: var(--ai-accent);
    }

    /* Manual-mode counterpart of the AI strip: left = activity / state
       summary (headline + ellipsized subtext, full breakdown on hover),
       clicking opens the timeline popover; right = the per-thread note
       icon (amber when a note exists). Neutral grey framing — priority
       lives entirely in the picker below. */
    .thread-pill-group {
      display: flex;
      width: 100%;
      margin: 0 0 0.25rem;
      background: rgba(140, 149, 159, 0.07);
      border: 1px solid var(--pico-muted-border-color);
      border-radius: 0.4rem;
      overflow: hidden;
    }
    .thread-pill-main,
    .thread-note-btn {
      background: none;
      border: none;
      margin: 0;
      cursor: pointer;
      font-size: 0.66rem;
      font-weight: 600;
      line-height: 1.4;
      color: var(--pico-color);
    }
    .thread-pill-main {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: baseline;
      gap: 0.3rem;                /* icon → muted text; matches the AI pill */
      padding: 0.14rem 0.5rem;
      letter-spacing: 0.01em;
      border-right: 1px solid rgba(140, 149, 159, 0.55);  /* match the priority picker's band divider */
    }
    .thread-pill-headline { flex-shrink: 0; white-space: nowrap; }
    .thread-pill-subtext {
      flex: 1;
      min-width: 0;               /* lets the ellipsis trigger */
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 400;
      pointer-events: none;       /* see .ai-verdict-desc — dodge Safari's clipped-text tooltip */
    }
    /* Tri-state: bright = "new since visit"; amber = the user's note (matches
       the note button's saved-note tint); muted = standing facts / fallback. */
    .thread-pill-subtext.kind-activity { color: var(--pico-color); }
    .thread-pill-subtext.kind-note     { color: var(--accent-amber); }
    .thread-pill-subtext.kind-muted    { color: var(--pico-muted-color); }
    .thread-note-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.14rem 0.4rem;
      color: var(--pico-muted-color);
    }
    .thread-note-btn svg { width: 0.82rem; height: 0.82rem; }
    .thread-note-btn.has-note { color: var(--accent-amber-deep); }   /* a saved note — same amber as the note / tracked accents */
    .thread-pill-main:hover,
    .thread-note-btn:hover { background: rgba(140, 149, 159, 0.16); }
    .thread-pill-group .thread-pill-icon {
      width: 0.85em;
      height: 0.85em;
      margin-right: 0.3rem;
      vertical-align: -0.12em;
      color: var(--pico-muted-color);
    }
    /* Tinted on threads the user has never engaged with — parallel to AI
       mode's "unassessed" word, but compact: same icon slot, accent color
       carries the meaning. */
    .thread-pill-headline.never-visited .thread-pill-icon {
      color: var(--accent-amber);
    }

    /* Pulse the pill while an AI request is in flight on this row (Ask AI
       or Re-ask both set hx-indicator="closest tr", so the row gets
       .htmx-request). The manual pill never triggers a long request of its
       own, but share the rule so a row-level indicator covers it too. */
    tr.htmx-request .ai-verdict-pill-group,
    tr.htmx-request .thread-pill-group {
      pointer-events: none;
      animation: ai-pulse 1.2s ease-in-out infinite;
    }
    @keyframes ai-pulse {
      0%, 100% { opacity: 0.45; }
      50%      { opacity: 0.85; }
    }

    /* Priority picker — one row of six cells grouped 2-2-2 under Low /
       Medium / High band labels. The labels are an overlay (pointer-events:
       none) sitting over the cells, each word centred on its pair so it
       straddles the faint divider between that pair's two cells; the
       brighter dividers fall between the three bands (and carry no label
       above them), which is what makes the grouping read. The active cell
       fills with a tint from the same oklch ramp as the verdict pill (its
       score set inline as --imp) — same look whether the highlight is a
       user pin or the AI verdict's score. */
    .priority-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      grid-template-rows: 1.25rem;
      min-width: 11rem;   /* keep cell pairs wide enough that the band labels
                             ("Medium" is the long one) fit on one line */
      max-width: 100%;
      margin: 0.3rem 0 0;
      background: rgba(140, 149, 159, 0.06);
      border: 1px solid var(--pico-muted-border-color);
      border-radius: 0.4rem;
      overflow: hidden;
    }
    .priority-cell {
      grid-row: 1;
      position: relative;
      background: none;
      border: none;
      margin: 0;
      padding: 0;
      cursor: pointer;
    }
    /* Within-pair divider: very faint. Band boundary (the .band-start cells
       — first of Medium, first of High): brighter, so the 2-2-2 reads. */
    .priority-cell + .priority-cell { box-shadow: inset 1px 0 0 rgba(140, 149, 159, 0.16); }
    .priority-cell.band-start:not(:first-child) {
      box-shadow: inset 1px 0 0 rgba(140, 149, 159, 0.55);
    }
    .priority-cell:hover { background: rgba(140, 149, 159, 0.13); }
    .priority-cell.active {
      --imp-e: pow(var(--imp), 1.4);
      --hue: calc(165 - pow(var(--imp), 2.5) * 115);
      --chroma: calc(0.06 + var(--imp-e) * 0.15);
      background: oklch(
        calc(0.56 + var(--imp-e) * 0.09)
        var(--chroma)
        var(--hue)
        / calc(0.62 + var(--imp-e) * 0.33));
    }
    .priority-band-label {
      grid-row: 1;
      align-self: center;
      justify-self: stretch;   /* fill the 2-cell span so the padding keeps the
                                  text clear of the band dividers on both sides */
      text-align: center;      /* centred → straddles the within-pair divider */
      white-space: nowrap;
      pointer-events: none;
      padding: 0 0.4rem;
      font-size: 0.6rem;
      font-weight: 500;
      line-height: 1;
      color: color-mix(in oklab, var(--pico-color) 60%, var(--pico-muted-color));
      text-shadow: 0 0 2px var(--pico-background-color);
    }

    /* AI verdict detail popover — extends action-popover with verdict-
       specific blocks (summary, rationale, action list, buttons).
       white-space override is needed because the popover descends from
       td.actions { white-space: nowrap }, and unlike the existing
       popovers (whose content is mostly textareas that block-level out
       of the inheritance), the verdict's prose blocks would otherwise
       refuse to wrap and force horizontal scroll. overflow-wrap: anywhere
       handles unbreakable runs (long URLs, model IDs in tooltips). */
    .ai-verdict-popover,
    .ai-verdict-popover .popover-title {
      white-space: normal;
      overflow-wrap: anywhere;
    }
    /* Wider than the default action-popover (24rem) so chat bubbles have
       room to breathe; max-height + overflow-y so long timelines scroll
       inside the popover instead of overflowing the viewport. */
    .ai-verdict-popover {
      min-width: 22rem;
      max-width: 30rem;
      max-height: 70vh;
      overflow-y: auto;
    }
    .ai-verdict-popover .ai-verdict-priority-tag {
      --imp: 0;
      --imp-e: pow(var(--imp), 1.4);
      --hue: calc(165 - pow(var(--imp), 2.5) * 115);
      --chroma: calc(var(--imp-e) * 0.19);
      display: inline-block;
      padding: 0 0.35rem;
      margin-left: 0.35rem;
      border-radius: 0.3rem;
      font-size: 0.6rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      vertical-align: 1px;
      background: oklch(
        calc(0.40 + var(--imp-e) * 0.20)
        var(--chroma)
        var(--hue)
        / calc(0.22 + var(--imp-e) * 0.60));
      color: var(--pico-color);
    }
    /* ── Timeline list ───────────────────────────────────────────── */
    /* Chronological event log inside the popover. ai_verdict and
       user_chat events render as full chat bubbles (visually emphasized
       so the user can read them); comment / review / user_action events
       collapse to a single muted line so a thread with 30 comments
       doesn't push the composer off-screen. */
    .ai-verdict-popover .timeline-list {
      list-style: none;
      padding: 0;
      margin: 0.3rem 0 0.45rem;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    .ai-verdict-popover .timeline-event {
      font-size: 0.74rem;
      line-height: 1.35;
    }
    /* A review a later review by the same author has overridden — kept in
       the log for history but dimmed so the live review state reads first. */
    .ai-verdict-popover .timeline-event.review-superseded {
      opacity: 0.45;
    }
    .ai-verdict-popover .timeline-line {
      display: flex;
      gap: 0.4rem;
      align-items: baseline;
      color: var(--pico-muted-color);
    }
