<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GitHub Triage</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='icon.svg') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='vendor/pico.min.css') }}">
  <script src="{{ url_for('static', filename='vendor/htmx.min.js') }}" defer></script>
  <style>
    main.container { max-width: 1400px; padding: 1.5rem 1.5rem 0; }
    table { font-size: 0.9rem; }
    th, td { vertical-align: middle; }
    /* Headline pill carries the single most action-defining signal;
       everything else demotes to a muted prose subhead below. Cell wraps
       so prose can breathe and a future AI sentence (1–3 lines) drops in
       without layout reflow. max-width keeps long prose from devouring
       horizontal space the title column needs. */
    td.status {
      white-space: normal;
      vertical-align: top;
      padding-top: 0.5rem;
      max-width: 16rem;
      line-height: 1.35;
    }
    td.status .status-prose {
      margin-top: 0.4rem;
      font-size: 0.78rem;
      color: var(--pico-muted-color);
    }
    .status-pill {
      display: inline-block;
      padding: 0.1rem 0.5rem;
      border-radius: 0.5rem;
      font-size: 0.7rem;
      font-weight: 500;
      color: white;
      white-space: nowrap;
    }
    /* Mergeable state warnings (top of stack — most actionable) */
    .status-pill.sev-danger  { background: #cf222e; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; font-size: 0.66rem; }
    .status-pill.sev-warning { background: #bf8700; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; font-size: 0.66rem; }
    /* Review state: positive (green) / negative (red) */
    .status-pill.review-approved { background: #1a7f37; }
    .status-pill.review-changes  { background: #cf222e; }
    /* Action-needed: red for direct, orange for team */
    .status-pill.action-assigned    { background: #cf222e; }
    .status-pill.action-review-you  { background: #cf222e; }
    .status-pill.action-review-team { background: #d29922; }
    /* Independent flags */
    .status-pill.flag-mention { background: #bc4c00; }
    /* "Since last looked" signals — same yellow as the pill-new dot. */
    .status-pill.new-comments { background: #bf8700; }
    td.title { width: 100%; }

    /* Type pill — color tracks GitHub state, not type. Sits at the head
       of the meta-row alongside labels. Sized to match .label-pill so it
       reads as a peer tag, with the state-color as the only differentiator. */
    .type-pill {
      display: inline-block;
      padding: 0.02rem 0.4rem;
      border-radius: 0.5rem;
      font-size: 0.62rem;
      font-weight: 500;
      line-height: 1.45;
      white-space: nowrap;
      color: white;
      background: #6e7781; /* default for Discussion / Release / not-yet-enriched */
    }

    /* Activity column — 2×N icon-grid of stats. Up to three rows: complexity
       (+adds, −dels) for PRs, popularity (▲ ▼), interest (💬 👥). Vertical-
       centered so a 2-row Issue block sits balanced against a 3-row PR's
       title height. Pills are avoided on count rows — they read as noise
       when their width fluctuates with single-digit numbers. */
    td.activity {
      width: 1%;
      white-space: nowrap;
      vertical-align: middle;
      padding-right: 1rem;
      text-align: center;
      font-size: 0.78rem;
    }
    td.activity .activity-stats {
      display: inline-grid;
      grid-template-columns: auto auto;
      gap: 0.2rem 0.8rem;
      color: var(--pico-muted-color);
      cursor: help;
    }
    /* Stretch each .stat to fill its grid column (default justify-self).
       Number takes the slack and right-aligns; icon pins to the right at
       a fixed 1em width. Reads as "<right-aligned number> <icon>" with
       icons aligning vertically across rows for easy scanning. */
    td.activity .activity-stats .stat {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      min-width: 2.5rem;
    }
    td.activity .activity-stats .stat-num {
      flex: 1;
      text-align: right;
    }
    td.activity .activity-stats .stat-icon {
      width: 1em;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    td.activity .activity-stats svg.stat-icon { height: 1em; }
    td.activity .activity-stats .rx-pos { color: #1a7f37; font-weight: 600; }
    td.activity .activity-stats .rx-neg { color: #cf222e; font-weight: 600; }
    /* Diff stats — desaturated greens/reds so they read as factual metric,
       distinct from the saturated reaction sentiment colors above. */
    td.activity .activity-stats .stat-add { color: #5b8c64; }
    td.activity .activity-stats .stat-del { color: #a8676b; }
    .type-pill.state-open                { background: #1f883d; }
    .type-pill.state-draft               { background: #57606a; }
    .type-pill.state-merged,
    .type-pill.state-closed_completed    { background: #8250df; }
    .type-pill.state-closed_pr           { background: #cf222e; }
    .type-pill.state-closed_not_planned  { background: #6e7781; }

    /* repo cell — owner above, name below, author below that, all clickable.
       Capped at 14rem so a long repo name (e.g. godot-proposals-viewer.github.io)
       wraps onto two lines instead of stretching the column and starving the
       title column. overflow-wrap: anywhere lets the break land on dots/hyphens.
       repo-line wraps the star + link per row so the star sits inline with
       the link's first text line even when the link wraps onto two lines. */
    td.repo { width: 1%; max-width: 14rem; line-height: 1.15; padding-right: 1rem; }
    td.repo a { text-decoration: none; }
    td.repo a:hover { text-decoration: underline; }
    .repo-line {
      display: flex;
      align-items: baseline;
      gap: 0.3rem;
      position: relative;
    }
    .repo-owner {
      font-size: 0.7rem;
      color: var(--pico-muted-color);
      overflow-wrap: anywhere;
      min-width: 0;
    }
    .repo-name {
      font-size: 0.88rem;
      font-weight: 600;
      overflow-wrap: anywhere;
      min-width: 0;
    }
    /* org/repo stars match the smaller person-star sizing — they're context
       indicators, not the row's primary action. */
    .org-star svg, .repo-star svg { width: 0.85em; height: 0.85em; }
    .repo-author {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      margin-top: 0.2rem;
      font-size: 0.72rem;
      color: var(--pico-muted-color);
      position: relative;
    }
    .repo-author .author-by { opacity: 0.7; }
    .repo-author .author-login { color: var(--pico-color); }
    .author-icon {
      width: 0.95em;
      height: 0.95em;
      flex-shrink: 0;
      cursor: help;
    }
    .author-icon.icon-member    { color: #1a7f37; }
    .author-icon.icon-firsttime { color: #bf8700; }
    .author-icon.icon-self      { color: #4493f8; }

    /* Favorite stars — inline-block with negative vertical-align trick keeps
       the SVG sitting at the same baseline as adjacent text (same approach
       used by the comment/eye icons in the meta row). */
    .star-btn {
      background: none;
      border: none;
      padding: 0;
      margin: 0;
      cursor: pointer;
      color: var(--pico-muted-color);
      width: auto;
      line-height: 1;
      display: inline-block;
    }
    .star-btn svg {
      width: 0.95em;
      height: 0.95em;
      vertical-align: -0.13em;
    }
    .star-btn:not(.is-favorite) svg { fill: none; stroke: currentColor; stroke-width: 2; }
    .star-btn.is-favorite { color: #d4a017; }
    .star-btn.is-favorite svg { fill: currentColor; stroke: currentColor; stroke-width: 2; }
    .item-star { margin-right: 0.45rem; }
    .person-star svg { width: 0.85em; height: 0.85em; }

    /* Row-level highlights, in increasing priority:
         context-fav: any of org/repo/author starred → subtle gold (1.5px, half-alpha)
         yours      : you authored this              → blue (3px)
         favorite   : item itself starred            → solid gold (3px)
       Later rules override earlier ones because both write box-shadow on
       the same first-child cell. Context-fav uses :not(...) on the rows
       above so a yours-row never gets demoted to subtle gold by an
       attribute-selector match. */
    tr[data-fav-author="true"]:not(.is-favorite-row):not(.is-yours-row) td:first-child,
    tr[data-fav-repo="true"]:not(.is-favorite-row):not(.is-yours-row) td:first-child,
    tr[data-fav-org="true"]:not(.is-favorite-row):not(.is-yours-row) td:first-child {
      box-shadow: inset 1.5px 0 0 rgba(212, 160, 23, 0.55);
    }
    tr.is-yours-row td:first-child    { box-shadow: inset 3px 0 0 #4493f8; }
    tr.is-favorite-row td:first-child { box-shadow: inset 3px 0 0 #d4a017; }

    /* Notes — pencil button in actions toggles a full-width drawer row
       beneath the main row. Drawer is collapsed by default. */
    .note-btn {
      background: none;
      border: none;
      padding: 0.2rem 0.4rem;
      margin: 0;
      cursor: pointer;
      color: var(--pico-muted-color);
      display: inline-block;
      width: auto;
      line-height: 1;
    }
    .note-btn svg {
      width: 1em;
      height: 1em;
      vertical-align: -0.18em;
    }
    .note-btn.has-note { color: #bf8700; }
    .note-btn:hover { color: var(--pico-color); }

    /* Entity-note pencil — sits absolutely at the right edge of its
       repo-line / repo-author parent. Hidden by default to keep idle rows
       clean; fades in on row hover; always visible (orange) when the
       entity has a note saved. The right-aligned float overlaps the link
       on long-wrap names — acceptable; uncommon. */
    .entity-note {
      position: absolute;
      right: 0;
      top: 0;
      padding: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.1s ease-in-out;
    }
    .entity-note svg { width: 0.9em; height: 0.9em; vertical-align: middle; }
    tr:hover .entity-note { opacity: 0.55; pointer-events: auto; }
    tr:hover .entity-note:hover { opacity: 1; }
    .entity-note.has-note { opacity: 1; pointer-events: auto; color: #bf8700; }

    tr.note-drawer { display: none; }
    tr.note-drawer.open { display: table-row; }
    tr.note-drawer td {
      padding: 0.5rem 2.4rem 0.8rem 1.2rem;  /* extra right padding for the × */
      background: var(--pico-card-background-color);
      border-top: none;
      position: relative;
    }
    tr.note-drawer .drawer-close {
      position: absolute;
      top: 0.35rem;
      right: 0.6rem;
      background: none;
      border: none;
      padding: 0.1rem 0.5rem;
      margin: 0;
      width: auto;
      cursor: pointer;
      color: var(--pico-muted-color);
      font-size: 1.1rem;
      line-height: 1;
    }
    tr.note-drawer .drawer-close:hover { color: var(--pico-color); }
    tr.note-drawer .drawer-label {
      font-size: 0.78rem;
      color: var(--pico-muted-color);
      margin-bottom: 0.3rem;
    }
    tr.note-drawer textarea {
      width: 100%;
      margin: 0;
      font-size: 0.85rem;
      min-height: 3rem;
      padding: 0.5rem 0.7rem;
    }

    /* title cell — single meta row carrying both stat pills (gray) and
       label pills (colored). Separate divs collapsed to one because, with
       the wider container, both fit on one line in the common case and
       wrap together when they don't. */
    td.title .meta-row {
      font-size: 0.74rem;
      color: var(--pico-muted-color);
      margin-top: 0.3rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      align-items: center;
    }
    /* Each metric group sits in a subtle pill so the boundaries are obvious. */
    .meta-stat {
      display: inline-flex;
      gap: 0.3rem;
      align-items: baseline;
      padding: 0.08rem 0.5rem;
      border-radius: 0.45rem;
      background: rgba(140, 149, 159, 0.12);
      white-space: nowrap;
      cursor: help;
    }
    .meta-diff {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 0.72rem;
    }
    /* Diff stays green/red (universal diff convention) but desaturated +
       regular weight, so it reads as factual metric — distinct from the
       saturated bold ▲/▼ reaction colors which carry sentiment. */
    .meta-diff .add { color: #5b8c64; }
    .meta-diff .del { color: #a8676b; }
    .icon {
      width: 0.95em;
      height: 0.95em;
      vertical-align: -0.13em;
      flex-shrink: 0;
    }
    .label-pill {
      display: inline-block;
      padding: 0.02rem 0.4rem;
      border-radius: 0.5rem;
      font-size: 0.62rem;
      font-weight: 500;
      line-height: 1.45;
      white-space: nowrap;
      opacity: 0.9;
    }
    .label-more {
      font-size: 0.62rem;
      color: var(--pico-muted-color);
      cursor: help;
      padding: 0 0.2rem;
    }

    /* actions — vertical 3-line list: Read / Muted (mutually exclusive) + Note */
    td.actions { white-space: nowrap; width: 1%; vertical-align: top; padding-top: 0.4rem; }
    td.actions .action-line {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      width: 100%;
      padding: 0.15rem 0.4rem;
      margin: 0;
      background: none;
      border: none;
      border-radius: 0.3rem;
      cursor: pointer;
      font-size: 0.82rem;
      color: var(--pico-color);
      text-align: left;
      line-height: 1.3;
    }
    /* Wrap Read + Muted in a subtle pill so the radio group reads as one unit
       (Note sits outside it). Same tint family as the meta-stat pills above. */
    td.actions .action-group {
      background: rgba(140, 149, 159, 0.08);
      border-radius: 0.45rem;
      padding: 0.15rem;
    }
    td.actions .action-line:hover {
      background: rgba(140, 149, 159, 0.18);
    }
    td.actions .action-line .action-mark {
      width: 0.95em;
      height: 0.95em;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--pico-muted-color);
    }
    td.actions .action-line .action-mark svg {
      width: 100%;
      height: 100%;
    }
    td.actions .action-line.active .action-mark { color: #1a7f37; }
    /* Note sits outside the Read/Muted pill — small breathing room. */
    td.actions .note-line { margin-top: 0.3rem; }
    td.actions .note-line.has-note .action-mark { color: #bf8700; }

    /* time bucket separators */
    tr.bucket-separator td {
      background: transparent;
      color: var(--pico-muted-color);
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0.9rem 0.5rem 0.25rem;
      border-bottom: 1px solid var(--pico-muted-border-color);
    }
    tr.bucket-separator + tr td { padding-top: 0.5rem; }

    .toolbar { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.75rem; }
    .toolbar h1 { margin: 0; flex: 1; }
    .brand-logo { width: 1.6rem; height: 1.6rem; flex-shrink: 0; color: var(--pico-h1-color, currentColor); }

    /* Refresh as a small icon button — auto-fetch on tab focus carries most
       of the load, so the manual control stays quiet next to the status dot. */
    .refresh-icon-btn {
      background: none;
      border: none;
      padding: 0.25rem;
      margin: 0;
      cursor: pointer;
      color: var(--pico-muted-color);
      width: auto;
      line-height: 1;
    }
    .refresh-icon-btn:hover { color: var(--pico-color); }
    .refresh-icon-btn svg { width: 1.05em; height: 1.05em; vertical-align: middle; }
    .backfill-menu { margin: 0; }
    .backfill-menu summary { padding: 0.35rem 0.9rem; font-size: 0.9rem; }
    .backfill-menu ul { font-size: 0.88rem; }

    /* Status dot — green idle, orange pulsing while updating, red on error.
       Hover for details. Replaces the old hx-indicator-only spinner. */
    .status-dot {
      width: 0.7rem;
      height: 0.7rem;
      border-radius: 50%;
      flex-shrink: 0;
      cursor: help;
      transition: background-color 0.15s ease;
    }
    .status-dot.status-idle    { background: #1a7f37; }
    .status-dot.status-loading {
      background: #bf8700;
      animation: status-pulse 0.9s ease-in-out infinite;
    }
    .status-dot.status-error   { background: #cf222e; }
    @keyframes status-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.4; transform: scale(0.65); }
    }
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.9rem 1.4rem;
      align-items: center;
      margin: 0 0 1rem;
      padding: 0.5rem 0.75rem;
      border-top: 1px solid var(--pico-muted-border-color);
      border-bottom: 1px solid var(--pico-muted-border-color);
      font-size: 0.82rem;
    }
    .filter-bar .filter-toggle,
    .filter-bar .filter-select {
      margin: 0;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      cursor: pointer;
      user-select: none;
    }
    .filter-bar input[type="checkbox"] { margin: 0; }
    .filter-bar select {
      margin: 0;
      padding: 0.15rem 0.4rem;
      font-size: 0.82rem;
      min-width: 7rem;
      width: auto;
      height: auto;
      background-position: right 0.4rem center;
    }
    .filter-spacer { flex: 1; }
    .error { color: var(--pico-color-red-500); margin-bottom: 1rem; }
    tr.read { opacity: 0.45; }
    tr.read:hover { opacity: 1; }
    tr.action-error { outline: 1px solid var(--pico-color-red-500); }
  </style>
  <script>
    // Global status indicator. HTMX request lifecycle drives loading/idle;
    // online/offline events and HX-Trigger 'showError' drive the error state.
    const setStatus = (state, msg) => {
      // Hard rule: while the browser thinks we're offline, the dot stays red.
      // Stops a stray successful afterRequest (in-flight request that completed
      // around the same time the offline event fired) from flipping back to idle.
      if (!navigator.onLine) {
        state = "error";
        msg = "Offline";
      }
      const dot = document.getElementById("status-dot");
      if (!dot) return;
      dot.className = "status-dot status-" + state;
      dot.title = msg;
    };
    if (!navigator.onLine) setStatus("error", "Offline");
    window.addEventListener("online",  () => setStatus("idle", "Up to date"));
    window.addEventListener("offline", () => setStatus("error", "Offline"));

    // Min visible duration so a sub-100ms 304 round-trip still flashes the
    // loading state long enough for the user to perceive it.
    const MIN_LOADING_MS = 300;
    let loadingSince = 0;
    document.addEventListener("htmx:beforeRequest", () => {
      // Don't drown out a sticky error state with transient loading flicker.
      const dot = document.getElementById("status-dot");
      if (dot && dot.classList.contains("status-error")) return;
      loadingSince = Date.now();
      setStatus("loading", "Updating…");
    });
    document.addEventListener("htmx:afterRequest", (e) => {
      const settle = () => {
        if (e.detail.successful) {
          setStatus("idle", "Up to date");
        } else {
          const code = e.detail.xhr ? e.detail.xhr.status : 0;
          const txt  = (e.detail.xhr && e.detail.xhr.responseText) || "Network error";
          setStatus("error", `HTTP ${code}: ${String(txt).slice(0, 240)}`);
        }
      };
      const elapsed = Date.now() - loadingSince;
      if (elapsed < MIN_LOADING_MS) {
        setTimeout(settle, MIN_LOADING_MS - elapsed);
      } else {
        settle();
      }
    });
    // Server-handled errors (route caught + still rendered the table) come
    // through as HX-Trigger 'showError' on a 200 response.
    document.addEventListener("showError", (e) => {
      setStatus("error", e.detail.message || "Error");
    });

    document.addEventListener("htmx:responseError", (e) => {
      const tr = e.detail.elt.closest("tr");
      if (tr) tr.classList.add("action-error");
      const status = e.detail.xhr.status;
      console.error("Action failed:", status, e.detail.xhr.responseText);
    });

    // Auto-refresh when the tab regains focus (catches reads done on github.com).
    // Debounced to once per 30s to avoid hammering the API on tab-switching.
    let lastFocusRefresh = Date.now();
    document.addEventListener("visibilitychange", () => {
      if (document.hidden) return;
      if (Date.now() - lastFocusRefresh < 30000) return;
      const target = document.querySelector("#notifications-table");
      if (!target) return;
      lastFocusRefresh = Date.now();
      htmx.ajax("POST", "/refresh", { target, swap: "innerHTML" });
    });

    // Entity (person/repo/org) favorite toggles broadcast a single
    // entityFavoriteChanged event. The originating row is updated by the
    // HTMX row-swap; this handler updates *every other* affected row's
    // star icons and the data-fav-* attribute the row-highlight CSS reads.
    // Idempotent (force-set toggle), so a stray repeat is harmless.
    const ENTITY_ROW_ATTR = { person: "author", repo: "repo", org: "org" };
    document.addEventListener("entityFavoriteChanged", (e) => {
      const { kind, key, is_favorite } = e.detail;
      const rowAttr = ENTITY_ROW_ATTR[kind];
      if (!rowAttr) return;
      const escaped = CSS.escape(key);
      // Star buttons of this kind referencing this key.
      document.querySelectorAll(
        `button.${kind}-star[data-key="${escaped}"]`
      ).forEach((btn) => {
        btn.classList.toggle("is-favorite", is_favorite);
        btn.setAttribute(
          "title",
          `${is_favorite ? "Unfavorite" : "Favorite"} ${key}`
        );
      });
      // Rows whose author/repo/org matches — drives the subtle row stripe.
      const datasetKey =
        "fav" + rowAttr.charAt(0).toUpperCase() + rowAttr.slice(1);
      document.querySelectorAll(
        `tr[data-${rowAttr}="${escaped}"]`
      ).forEach((tr) => {
        tr.dataset[datasetKey] = String(is_favorite);
      });
    });

    // Esc closes the drawer that owns the focused textarea. The drawer
    // collapsing to display:none auto-blurs the textarea, which fires
    // HTMX's blur trigger and saves any in-flight typing. preventDefault
    // so Safari doesn't also use the same Esc to exit fullscreen.
    document.addEventListener("keydown", (e) => {
      if (e.key !== "Escape") return;
      const ta = document.activeElement;
      if (!(ta instanceof HTMLTextAreaElement)) return;
      const drawer = ta.closest(".note-drawer.open");
      if (!drawer) return;
      e.preventDefault();
      drawer.classList.remove("open");
    });

    // Note drawer toggle — exclusive within a row group (item / org / repo /
    // person). Walks forward from the main row collecting adjacent
    // .note-drawer rows, then opens the matching one and closes the rest.
    function toggleNoteDrawer(btn, kind) {
      let row = btn.closest("tr");
      // The main row is the closest ancestor tr that is NOT a note-drawer.
      while (row && row.classList.contains("note-drawer")) {
        row = row.previousElementSibling;
      }
      if (!row) return;
      let n = row.nextElementSibling;
      while (n && n.classList.contains("note-drawer")) {
        if (n.dataset.kind === kind) n.classList.toggle("open");
        else n.classList.remove("open");
        n = n.nextElementSibling;
      }
    }

    // Note save broadcasts entityNoteChanged so every matching pencil
    // (across rows referencing the same entity) updates its has-note state
    // without re-rendering the row. Symmetric with entityFavoriteChanged.
    document.addEventListener("entityNoteChanged", (e) => {
      const { kind, key, has_note } = e.detail;
      const escaped = CSS.escape(key);
      document.querySelectorAll(
        `.note-btn[data-kind="${kind}"][data-key="${escaped}"]`
      ).forEach((b) => b.classList.toggle("has-note", has_note));
    });

    // bfcache restoration: when a page comes back from the back-forward
    // cache, the in-memory DOM is restored — for our table that means
    // pre-save textarea state with no real server fetch. Force a real
    // reload so the user sees the server's truth.
    window.addEventListener("pageshow", (e) => {
      if (e.persisted) location.reload();
    });

    // Flush dirty note textareas on tab close / reload / navigation.
    // sendBeacon is the browser-native API for fire-and-forget POSTs that
    // survive page unload (regular fetch/XHR may be cancelled mid-flight).
    window.addEventListener("pagehide", () => {
      document.querySelectorAll(".note-drawer form").forEach((form) => {
        const ta = form.querySelector("textarea");
        if (!ta) return;
        if (ta.value === ta.defaultValue) return;
        const url = form.getAttribute("hx-post");
        if (!url) return;
        const data = new FormData();
        data.append("note_user", ta.value);
        navigator.sendBeacon(url, data);
      });
    });
  </script>
</head>
<body>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
