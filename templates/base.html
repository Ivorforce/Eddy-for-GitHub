<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GitHub Triage</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='icon.svg') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='vendor/pico.min.css') }}">
  <script src="{{ url_for('static', filename='vendor/htmx.min.js') }}" defer></script>
  <style>
    /* Capture root body text color in a non-Pico variable so anchors can
       reach for the body color without fighting Pico's anchor-scoped
       --pico-color redefinition (Pico rebinds --pico-color to the link
       primary inside `a` selectors, which is fine for ordinary links but
       wrong when we want the anchor to read as content text). */
    :root { --content-color: var(--pico-color); }
    main.container { max-width: 1400px; padding: 1rem 1.25rem 0; }
    table { font-size: 0.86rem; }
    th, td { vertical-align: middle; }
    /* Pico's default td padding is ~1rem vertical, which sets the floor on
       row height. Halve it so per-column padding-top overrides actually
       show up — bottom padding had been the hidden constraint. */
    table td { padding: 0.45rem 0.5rem; }
    /* Headline pill carries the single most action-defining signal;
       everything else demotes to a muted prose subhead below. Cell wraps
       so prose can breathe and a future AI sentence (1–3 lines) drops in
       without layout reflow. max-width keeps long prose from devouring
       horizontal space the title column needs. */
    td.status {
      white-space: normal;
      vertical-align: top;
      padding-top: 0.3rem;
      max-width: 16rem;
      line-height: 1.3;
    }
    td.status .status-prose {
      margin-top: 0.25rem;
      font-size: 0.78rem;
      color: var(--pico-muted-color);
    }
    .status-pill {
      display: inline-block;
      padding: 0.1rem 0.5rem;
      border-radius: 0.5rem;
      font-size: 0.7rem;
      font-weight: 500;
      color: white;
      white-space: nowrap;
    }
    /* Mergeable state warnings (top of stack — most actionable) */
    .status-pill.sev-danger  { background: #cf222e; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; font-size: 0.66rem; }
    .status-pill.sev-warning { background: #bf8700; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; font-size: 0.66rem; }
    /* Review state: positive (green) / negative (red) */
    .status-pill.review-approved { background: #1a7f37; }
    .status-pill.review-changes  { background: #cf222e; }
    /* Action-needed: red for direct, orange for team */
    .status-pill.action-assigned    { background: #cf222e; }
    .status-pill.action-review-you  { background: #cf222e; }
    .status-pill.action-review-team { background: #d29922; }
    /* Independent flags */
    .status-pill.flag-mention { background: #bc4c00; }
    /* "Since last looked" signals — same yellow as the pill-new dot. */
    .status-pill.new-comments { background: #bf8700; }
    /* width:100% + max-width:0 is the classic table-cell ellipsis trick:
       the cell takes all remaining horizontal space (since other cells use
       width:1%), but the max-width forces descendant overflow rules to
       actually clip rather than grow the column. Without this, a long
       title elongates the table past the viewport. */
    td.title { width: 100%; max-width: 0; }

    /* Type pill — color tracks GitHub state, not type. Sits at the head
       of the meta-row alongside labels. Sized to match .label-pill so it
       reads as a peer tag, with the state-color as the only differentiator. */
    .type-pill {
      display: inline-block;
      padding: 0.02rem 0.4rem;
      border-radius: 0.5rem;
      font-size: 0.62rem;
      font-weight: 500;
      line-height: 1.45;
      white-space: nowrap;
      color: white;
      background: #6e7781; /* default for Discussion / Release / not-yet-enriched */
    }

    /* Activity column — 2×N icon-grid of stats. Up to three rows: complexity
       (+adds, −dels) for PRs, popularity (▲ ▼), interest (💬 👥). Vertical-
       centered so a 2-row Issue block sits balanced against a 3-row PR's
       title height. Pills are avoided on count rows — they read as noise
       when their width fluctuates with single-digit numbers. */
    td.activity {
      width: 1%;
      white-space: nowrap;
      vertical-align: middle;
      padding: 0.3rem 0.5rem;
      text-align: center;
      font-size: 0.78rem;
    }
    td.activity .activity-stats {
      display: inline-grid;
      grid-template-columns: auto auto;
      gap: 0 0.7rem;
      line-height: 1.2;
      color: var(--pico-muted-color);
      cursor: help;
    }
    /* Stat atom in the activity column — number + icon side by side. */
    .stat {
      display: inline-flex;
      align-items: center;
      gap: 0.2rem;
    }
    .stat-icon {
      width: 1em;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    svg.stat-icon { height: 1em; }
    /* Diff stats — desaturated greens/reds so they read as factual metric,
       distinct from the saturated reaction sentiment colors below. */
    .stat-add { color: #5b8c64; }
    .stat-del { color: #a8676b; }
    /* Activity column only: each .stat fills its grid slot (min-width +
       right-aligned number) so icons line up vertically across rows. */
    td.activity .activity-stats .stat { min-width: 2.5rem; }
    td.activity .activity-stats .stat-num { flex: 1; text-align: right; }
    /* Item creation age — spans both grid columns as a header so the 2x2
       reactions/comments grid below stays clean. Color comes inline from a
       log-mapped HSL gradient (see _age_pill in app/web.py). */
    td.activity .activity-stats .age-pill {
      grid-column: 1 / -1;
      min-width: 0;
      font-weight: 600;
      justify-content: center;
    }
    .type-pill.state-open                { background: #1f883d; }
    .type-pill.state-draft               { background: #57606a; }
    .type-pill.state-merged,
    .type-pill.state-closed_completed,
    .type-pill.state-answered            { background: #8250df; }
    .type-pill.state-closed_pr           { background: #cf222e; }
    .type-pill.state-closed,
    .type-pill.state-closed_not_planned  { background: #6e7781; }

    /* repo cell — owner above, name below, author below that, all clickable.
       Capped at 14rem so a long repo name (e.g. godot-proposals-viewer.github.io)
       wraps onto two lines instead of stretching the column and starving the
       title column. overflow-wrap: anywhere lets the break land on dots/hyphens.
       repo-line wraps the star + link per row so the star sits inline with
       the link's first text line even when the link wraps onto two lines. */
    td.repo { width: 1%; max-width: 14rem; line-height: 1.1; padding-right: 1rem; }
    td.repo a { text-decoration: none; }
    td.repo a:hover { text-decoration: underline; }
    .repo-line {
      display: flex;
      align-items: baseline;
      gap: 0.3rem;
      position: relative;
    }
    .repo-owner {
      font-size: 0.7rem;
      color: var(--pico-muted-color);
      overflow-wrap: anywhere;
      min-width: 0;
    }
    /* Trailing slash signals "this owner contains the repo below" — turns
       the stacked owner/name into a directional path, distinguishing it
       from the indented author line below. */
    .repo-owner.entity-trigger::after {
      content: "/";
      opacity: 0.6;
    }
    .repo-name {
      font-size: 0.88rem;
      font-weight: 600;
      overflow-wrap: anywhere;
      min-width: 0;
    }
    /* Author indents under the repo so it reads as item-attribution, not
       another segment of the owner/repo path. */
    .repo-author {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      margin-top: 0.1rem;
      padding-left: 0.45rem;
      font-size: 0.72rem;
      color: var(--pico-muted-color);
      position: relative;
    }
    .repo-author .author-by { opacity: 0.7; }
    .author-icon {
      width: 0.95em;
      height: 0.95em;
      flex-shrink: 0;
      cursor: help;
    }
    .author-icon.icon-member    { color: #1a7f37; }
    .author-icon.icon-firsttime { color: #bf8700; }
    .author-icon.icon-self      { color: #4493f8; }
    .author-icon.icon-generic   { opacity: 0.55; }

    /* Entity name = popover trigger. Reads as content (body color), not as
       a styled link — same readability fix as the item title. The repo-owner
       (org) stays muted because it's secondary context, not a primary scan
       target. Tracked state tint takes priority. Plain left-click opens the
       popover (intercepted in JS); middle/cmd-click navigates the link. */
    .entity-trigger { cursor: pointer; }
    a.entity-trigger { color: var(--content-color); }
    .repo-owner.entity-trigger { color: var(--pico-muted-color); }
    .author-login.entity-trigger { font-weight: 500; }
    .entity-trigger.is-tracked { color: #eaa54a; }
    /* Item title is the longest piece of free-text prose on the row, so it
       reads as text rather than as a styled link: inherits body color (NOT
       Pico's anchor-scoped --pico-color, which is the link primary blue —
       hence the explicit `inherit`), no underline at rest, hover gets the
       underline as the click affordance. Slight font-weight bump matches
       GitHub's content-link convention (bold-ish text, blue only on hover).
       Tracked-state tint takes priority over the default color. */
    /* Title is clamped to 1 line: text ellipsizes, full string lives in
       the title attribute (hover tooltip). Flex layout lets the trailing
       "never visited" dot stay pinned to the right while only the inner
       .item-title-text is the ellipsis target. */
    a.item-title, span.item-title {
      color: var(--content-color);
      text-decoration: none;
      font-weight: 500;
      display: flex;
      align-items: baseline;
      min-width: 0;
    }
    a.item-title .item-title-text,
    span.item-title .item-title-text {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }
    a.item-title:hover .item-title-text { text-decoration: underline; }
    a.item-title.is-tracked,
    a.item-title.is-tracked:hover,
    span.item-title.is-tracked { color: #eaa54a; }

    /* "Never visited" dot. Polarity is flipped: most rows get visited at
       some point, so we mark the *rare* unvisited case rather than the
       common visited case. The :visited selector is privacy-locked and
       additionally clamps the alpha channel to match :link — that's why
       `color: transparent` (alpha 0) doesn't work and falls back to the
       inherited text color (black on light mode). The workaround is to
       set :visited's color to a same-alpha value that blends visually
       with the row background. */
    a.item-title::after {
      content: "●";
      color: #8ea4c4;
      margin-left: 0.4em;
      font-size: 0.55em;
      vertical-align: 0.3em;
      flex-shrink: 0;
    }
    /* Literal hex required: var() doesn't resolve in :visited (privacy
       clamp). Values mirror Pico's --pico-background-color in each scheme. */
    a.item-title:visited::after { color: #ffffff; }
    @media (prefers-color-scheme: dark) {
      a.item-title:visited::after { color: #13161e; }
    }

    /* Row-level highlights, in increasing priority:
         context-track: any of org/repo/author tracked → subtle warm-yellow
                                                         (1.5px, half-alpha)
         yours        : you authored this              → blue (3px)
         tracked      : item itself tracked            → solid warm-yellow (3px)
       Later rules override earlier ones because both write box-shadow on
       the same first-child cell. Context-track uses :not(...) on the rows
       above so a yours-row never gets demoted to subtle warm-yellow by an
       attribute-selector match. */
    tr[data-tracked-author="true"]:not(.is-tracked-row):not(.is-yours-row) td:first-child,
    tr[data-tracked-repo="true"]:not(.is-tracked-row):not(.is-yours-row) td:first-child,
    tr[data-tracked-org="true"]:not(.is-tracked-row):not(.is-yours-row) td:first-child {
      box-shadow: inset 1.5px 0 0 rgba(234, 165, 74, 0.55);
    }
    tr.is-yours-row td:first-child   { box-shadow: inset 3px 0 0 #4493f8; }
    tr.is-tracked-row td:first-child { box-shadow: inset 3px 0 0 #eaa54a; }

    /* Item-level popover trigger ("•••") — sits in the actions cell where
       the old inline star + Note button used to live, replacing both. */
    /* Sits on a second line below the segmented control. Text label
       ("More…") rather than a kebab so the affordance is discoverable —
       column never goes wider than the segment pill above it. */
    .item-trigger-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--pico-muted-color);
      font-size: 0.7rem;
      line-height: 1;
      padding: 0.15rem 0.3rem;
      margin: 0.2rem 0 0;
      border-radius: 0.3rem;
      text-align: left;
    }
    .item-trigger-btn:hover { color: var(--pico-color); background: rgba(140, 149, 159, 0.18); }

    /* Action popover panel — shared chrome for org / repo / person / item.
       Anchored below its trigger via CSS Anchor Positioning (anchor-name on
       the trigger, position-anchor here). Falls back to default popover
       placement on browsers that don't support anchor positioning yet. */
    .action-popover[popover] {
      /* Reset UA defaults so anchor positioning is the only thing placing it. */
      inset: auto;
      margin: 0;
      padding: 0.55rem 0.65rem;
      border: 1px solid var(--pico-muted-border-color);
      border-radius: 0.5rem;
      background: var(--pico-card-background-color);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.18);
      min-width: 18rem;
      max-width: 26rem;
      font-size: 0.85rem;
      color: var(--pico-color);
    }
    .action-popover[popover]:popover-open {
      position-area: bottom span-right;
      margin-top: 0.3rem;
      position-try-fallbacks: flip-block, flip-inline, flip-block flip-inline;
    }
    .action-popover .popover-title {
      margin-bottom: 0.4rem;
      font-size: 0.85rem;
    }
    .action-popover .popover-kind {
      font-size: 0.68rem;
      color: var(--pico-muted-color);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-right: 0.35rem;
    }
    .action-popover .popover-name {
      color: var(--pico-color);
      font-weight: 600;
      text-decoration: none;
    }
    .action-popover .popover-name:hover { text-decoration: underline; }
    .action-popover .popover-track-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      width: 100%;
      text-align: left;
      background: none;
      border: 1px solid var(--pico-muted-border-color);
      border-radius: 0.35rem;
      padding: 0.3rem 0.55rem;
      margin: 0 0 0.45rem;
      font-size: 0.88rem;
      cursor: pointer;
      color: var(--pico-color);
    }
    .action-popover .popover-track-btn:hover { background: rgba(140, 149, 159, 0.12); }
    .action-popover .popover-track-btn .track-icon {
      width: 1.05em;
      height: 1.05em;
      flex-shrink: 0;
      color: #eaa54a;
    }
    .action-popover form { margin: 0 0 0.45rem; }
    .action-popover textarea {
      width: 100%;
      margin: 0;
      font-size: 0.85rem;
      min-height: 3rem;
      padding: 0.4rem 0.55rem;
    }

    /* title meta-row — type pill, PR diff (if any), and labels share one
       wrapping line so they fit when narrow but stay grouped when wide. */
    td.title .meta-row {
      font-size: 0.74rem;
      color: var(--pico-muted-color);
      margin-top: 0.3rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      align-items: center;
    }
    .icon {
      width: 0.95em;
      height: 0.95em;
      vertical-align: -0.13em;
      flex-shrink: 0;
    }
    .label-pill {
      display: inline-block;
      padding: 0.02rem 0.4rem;
      border-radius: 0.5rem;
      font-size: 0.62rem;
      font-weight: 500;
      line-height: 1.45;
      white-space: nowrap;
      opacity: 0.9;
    }
    /* Discussion category — sibling of .label-pill, sized identically so it
       slots into the same meta-row. GraphQL exposes no color for categories,
       so the pill is neutral; the outline + muted text keep it visually
       distinct from user-colored labels. */
    .category-pill {
      display: inline-block;
      padding: 0.02rem 0.4rem;
      border-radius: 0.5rem;
      font-size: 0.62rem;
      font-weight: 500;
      line-height: 1.45;
      white-space: nowrap;
      border: 1px solid var(--pico-muted-border-color);
      color: var(--pico-muted-color);
    }
    .label-more {
      font-size: 0.62rem;
      color: var(--pico-muted-color);
      cursor: help;
      padding: 0 0.2rem;
    }

    /* actions — single-line segmented control (Read | Muted, mutually
       exclusive) + the ••• item-popover trigger. The "active" segment is a
       filled tint, not an icon: the fill itself signals "you're here".
       Read uses a muted green, Muted uses a neutral gray, so the two states
       are distinguishable by hue, not just by which side is filled. */
    td.actions { white-space: nowrap; width: 1%; vertical-align: middle; }
    td.actions .action-group {
      display: flex;
      background: rgba(140, 149, 159, 0.08);
      border: 1px solid var(--pico-muted-border-color);
      border-radius: 0.4rem;
      overflow: hidden;
    }
    td.actions .action-segment {
      background: none;
      border: none;
      margin: 0;
      padding: 0.2rem 0.5rem;
      cursor: pointer;
      line-height: 1;
      color: var(--pico-muted-color);
      text-align: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    td.actions .action-segment svg {
      width: 0.95rem;
      height: 0.95rem;
      display: block;
    }
    td.actions .action-segment + .action-segment {
      border-left: 1px solid var(--pico-muted-border-color);
    }
    td.actions .action-segment:hover {
      background: rgba(140, 149, 159, 0.18);
      color: var(--pico-color);
    }
    td.actions .action-segment.active {
      font-weight: 600;
      color: var(--pico-color);
    }
    td.actions .action-segment.seg-read.active {
      background: rgba(26, 127, 55, 0.22);
    }
    td.actions .action-segment.seg-mute.active {
      background: rgba(140, 149, 159, 0.32);
    }

    /* time bucket separators */
    tr.bucket-separator td {
      background: transparent;
      color: var(--pico-muted-color);
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0.55rem 0.5rem 0.2rem;
      border-bottom: 1px solid var(--pico-muted-border-color);
    }
    tr.bucket-separator + tr td { padding-top: 0.3rem; }

    .toolbar { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem; }
    .toolbar h1 { margin: 0; flex: 1; font-size: 1.35rem; font-weight: 600; }
    .brand-logo { width: 1.25rem; height: 1.25rem; flex-shrink: 0; color: var(--pico-h1-color, currentColor); }

    /* Refresh as a small icon button — auto-fetch on tab focus carries most
       of the load, so the manual control stays quiet next to the status dot. */
    .refresh-icon-btn {
      background: none;
      border: none;
      padding: 0.25rem;
      margin: 0;
      cursor: pointer;
      color: var(--pico-muted-color);
      width: auto;
      line-height: 1;
    }
    .refresh-icon-btn:hover { color: var(--pico-color); }
    .refresh-icon-btn svg { width: 1.05em; height: 1.05em; vertical-align: middle; }
    .backfill-menu { margin: 0; }
    .backfill-menu summary { padding: 0.35rem 0.9rem; font-size: 0.9rem; }
    .backfill-menu ul { font-size: 0.88rem; }

    /* Status dot — green idle, orange pulsing while updating, red on error.
       Hover for details. Replaces the old hx-indicator-only spinner. */
    .status-dot {
      width: 0.7rem;
      height: 0.7rem;
      border-radius: 50%;
      flex-shrink: 0;
      cursor: help;
      transition: background-color 0.15s ease;
    }
    .status-dot.status-idle    { background: #1a7f37; }
    .status-dot.status-loading {
      background: #bf8700;
      animation: status-pulse 0.9s ease-in-out infinite;
    }
    .status-dot.status-error   { background: #cf222e; }
    @keyframes status-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.4; transform: scale(0.65); }
    }
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1.2rem;
      align-items: center;
      margin: 0 0 0.6rem;
      padding: 0.35rem 0.6rem;
      border-top: 1px solid var(--pico-muted-border-color);
      border-bottom: 1px solid var(--pico-muted-border-color);
      font-size: 0.82rem;
    }
    .filter-bar .filter-toggle,
    .filter-bar .filter-select {
      margin: 0;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      cursor: pointer;
      user-select: none;
    }
    .filter-bar input[type="checkbox"] { margin: 0; }
    .filter-bar select {
      margin: 0;
      padding: 0.15rem 0.4rem;
      font-size: 0.82rem;
      min-width: 7rem;
      width: auto;
      height: auto;
      background-position: right 0.4rem center;
    }
    /* Repo names can run long (owner + repo + path-y bits); fix the width
       so the toolbar doesn't reflow when a deep org/repo is selected.
       Truncation in the closed select is browser-handled via the inline
       text width; the full name is visible in the dropdown list. */
    .filter-bar select[name="repo"] { width: 13rem; }
    .filter-spacer { flex: 1; }
    .error { color: var(--pico-color-red-500); margin-bottom: 1rem; }
    tr.read { opacity: 0.45; }
    tr.read:hover { opacity: 1; }
    tr.action-error { outline: 1px solid var(--pico-color-red-500); }

    /* Custom tooltip layer. Browser-native title tooltips have an
       OS-controlled delay (~500–1500ms on macOS) we can't tune. This
       takes over the title attribute, showing after ~120ms instead. */
    .custom-tooltip {
      position: fixed;
      z-index: 1000;
      background: rgba(20, 22, 30, 0.95);
      color: #fff;
      padding: 0.3rem 0.5rem;
      border-radius: 0.3rem;
      font-size: 0.74rem;
      line-height: 1.35;
      max-width: 26rem;
      pointer-events: none;
      white-space: pre-line;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.25);
      opacity: 0;
      transition: opacity 0.08s ease-out;
    }
    .custom-tooltip.shown { opacity: 1; }
  </style>
  <script>
    // Global status indicator. HTMX request lifecycle drives loading/idle;
    // online/offline events and HX-Trigger 'showError' drive the error state.
    const setStatus = (state, msg) => {
      // Hard rule: while the browser thinks we're offline, the dot stays red.
      // Stops a stray successful afterRequest (in-flight request that completed
      // around the same time the offline event fired) from flipping back to idle.
      if (!navigator.onLine) {
        state = "error";
        msg = "Offline";
      }
      const dot = document.getElementById("status-dot");
      if (!dot) return;
      dot.className = "status-dot status-" + state;
      dot.title = msg;
    };
    if (!navigator.onLine) setStatus("error", "Offline");
    window.addEventListener("online",  () => setStatus("idle", "Up to date"));
    window.addEventListener("offline", () => setStatus("error", "Offline"));

    // Min visible duration so a sub-100ms 304 round-trip still flashes the
    // loading state long enough for the user to perceive it.
    const MIN_LOADING_MS = 300;
    let loadingSince = 0;
    document.addEventListener("htmx:beforeRequest", () => {
      // Don't drown out a sticky error state with transient loading flicker.
      const dot = document.getElementById("status-dot");
      if (dot && dot.classList.contains("status-error")) return;
      loadingSince = Date.now();
      setStatus("loading", "Updating…");
    });
    document.addEventListener("htmx:afterRequest", (e) => {
      const settle = () => {
        if (e.detail.successful) {
          setStatus("idle", "Up to date");
        } else {
          const code = e.detail.xhr ? e.detail.xhr.status : 0;
          const txt  = (e.detail.xhr && e.detail.xhr.responseText) || "Network error";
          setStatus("error", `HTTP ${code}: ${String(txt).slice(0, 240)}`);
        }
      };
      const elapsed = Date.now() - loadingSince;
      if (elapsed < MIN_LOADING_MS) {
        setTimeout(settle, MIN_LOADING_MS - elapsed);
      } else {
        settle();
      }
    });
    // Server-handled errors (route caught + still rendered the table) come
    // through as HX-Trigger 'showError' on a 200 response.
    document.addEventListener("showError", (e) => {
      setStatus("error", e.detail.message || "Error");
    });

    document.addEventListener("htmx:responseError", (e) => {
      const tr = e.detail.elt.closest("tr");
      if (tr) tr.classList.add("action-error");
      const status = e.detail.xhr.status;
      console.error("Action failed:", status, e.detail.xhr.responseText);
    });

    // Custom tooltip layer. Hijacks the title attribute so we can show
    // it after ~120ms instead of the browser's OS-controlled delay.
    // Strategy: on mouseenter, stash the title in data-stashed-title and
    // remove the attribute (so the browser doesn't also show its own).
    // Restore on mouseleave so semantics + accessibility tooling are
    // preserved when the user isn't actively hovering.
    const TOOLTIP_DELAY_MS = 120;
    let tooltipEl = null;
    let tooltipTimer = null;
    let tooltipTarget = null;
    // When the source is an SVG <title> child (used on author icons et al.
    // for accessibility), we have to remove the node to suppress the native
    // browser tooltip and re-insert it on hide. Stash {parent, node} here.
    let tooltipStashedSvgTitle = null;
    // Lazy-init so the script can run in <head> before <body> exists.
    const ensureTooltip = () => {
      if (!tooltipEl) {
        tooltipEl = document.createElement("div");
        tooltipEl.className = "custom-tooltip";
        document.body.appendChild(tooltipEl);
      }
      return tooltipEl;
    };

    const hideTooltip = () => {
      clearTimeout(tooltipTimer);
      if (tooltipEl) tooltipEl.classList.remove("shown");
      if (tooltipTarget) {
        const stashed = tooltipTarget.getAttribute("data-stashed-title");
        if (stashed !== null) {
          tooltipTarget.setAttribute("title", stashed);
          tooltipTarget.removeAttribute("data-stashed-title");
        }
        tooltipTarget = null;
      }
      if (tooltipStashedSvgTitle) {
        const { parent, node } = tooltipStashedSvgTitle;
        // Re-insert at the front so SVG semantics stay intact.
        parent.insertBefore(node, parent.firstChild);
        tooltipStashedSvgTitle = null;
      }
    };

    // True if the element (or any descendant) has horizontally clipped text.
    // Used to suppress tooltips that just duplicate visible text when nothing
    // is actually being clipped — see the mouseover handler below.
    const isTextTruncated = (el) => {
      const queue = [el];
      while (queue.length) {
        const node = queue.shift();
        if (node.scrollWidth > node.clientWidth + 1) return true;
        for (const child of node.children) queue.push(child);
      }
      return false;
    };

    // Resolve the trigger element + text for a hover event: either an
    // [title] ancestor, or an SVG with a <title> child.
    const resolveTooltipTrigger = (eventTarget) => {
      const titled = eventTarget.closest("[title]");
      if (titled) return { target: titled, text: titled.getAttribute("title"), svgTitleNode: null };
      const svg = eventTarget.closest("svg");
      if (svg) {
        const titleEl = svg.querySelector(":scope > title");
        if (titleEl) return { target: svg, text: titleEl.textContent, svgTitleNode: titleEl };
      }
      return null;
    };

    document.addEventListener("mouseover", (e) => {
      const trig = resolveTooltipTrigger(e.target);
      if (!trig || trig.target === tooltipTarget) return;
      hideTooltip();
      const { target, text, svgTitleNode } = trig;
      if (!text) return;
      // When the title just duplicates the element's visible text, it's a
      // truncation fallback — only useful when the text is actually clipped.
      // Still stash the title so the browser doesn't show its native tooltip;
      // hideTooltip restores it on mouseleave.
      const suppressDuplicate = !svgTitleNode
        && text.trim() === target.textContent.trim()
        && !isTextTruncated(target);
      tooltipTarget = target;
      if (svgTitleNode) {
        tooltipStashedSvgTitle = { parent: target, node: svgTitleNode };
        target.removeChild(svgTitleNode);
      } else {
        target.setAttribute("data-stashed-title", text);
        target.removeAttribute("title");
      }
      if (suppressDuplicate) return;
      tooltipTimer = setTimeout(() => {
        const tip = ensureTooltip();
        tip.textContent = text;
        // Position above the trigger, clamping to viewport.
        const rect = target.getBoundingClientRect();
        tip.style.left = "0px";
        tip.style.top = "0px";
        tip.classList.add("shown");
        const tipRect = tip.getBoundingClientRect();
        const margin = 6;
        let left = rect.left + rect.width / 2 - tipRect.width / 2;
        let top = rect.top - tipRect.height - margin;
        if (top < margin) top = rect.bottom + margin;
        left = Math.max(margin, Math.min(left, window.innerWidth - tipRect.width - margin));
        tip.style.left = `${left}px`;
        tip.style.top = `${top}px`;
      }, TOOLTIP_DELAY_MS);
    });

    document.addEventListener("mouseout", (e) => {
      if (!tooltipTarget) return;
      // Hide when the cursor leaves the target's subtree. relatedTarget
      // is null when leaving the window, which contains() treats as
      // outside — exactly what we want.
      if (!tooltipTarget.contains(e.relatedTarget)) hideTooltip();
    });

    // HTMX swaps can yank the tooltip target out of the DOM mid-hover.
    document.addEventListener("htmx:beforeSwap", hideTooltip);

    // Auto-refresh when the tab regains focus (catches reads done on github.com).
    // Debounced to once per 30s to avoid hammering the API on tab-switching.
    // Open drawers, dirty textarea content, focus, and cursor position are
    // preserved across the swap by the htmx:beforeSwap/afterSwap handlers
    // below, so it's safe to fire even while the user is mid-edit.
    let lastFocusRefresh = Date.now();
    document.addEventListener("visibilitychange", () => {
      if (document.hidden) return;
      if (Date.now() - lastFocusRefresh < 30000) return;
      const target = document.querySelector("#notifications-table");
      if (!target) return;
      lastFocusRefresh = Date.now();
      // ?auto=1 lets /refresh skip the dedicated unread fetch when the
      // poll predicate says it isn't needed (faster auto-refresh on a
      // quiet inbox). Manual button click omits the flag → full sync.
      htmx.ajax("POST", "/refresh?auto=1", { target, swap: "innerHTML" });
    });

    // Plain-left-click on a popover trigger opens its popover. Modifier
    // clicks (cmd/ctrl/shift/alt) and middle-click fall through to the
    // browser's native link behavior — for entity-name triggers (which are
    // <a href=...>), that opens GitHub in a new tab. For the item-level
    // ••• button (no href), modifier-clicks just do nothing, which is fine.
    document.addEventListener("click", (e) => {
      const trigger = e.target.closest("[data-popover-target]");
      if (!trigger) return;
      if (e.button !== 0) return;
      if (e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return;
      e.preventDefault();
      const pop = document.getElementById(trigger.dataset.popoverTarget);
      if (pop && typeof pop.showPopover === "function") {
        // togglePopover() makes the trigger idempotent for repeat clicks.
        pop.togglePopover();
      }
    });

    // Entity (person/repo/org) track toggles broadcast a single
    // entityTrackedChanged event. The originating row is updated by the
    // HTMX row-swap; this handler updates *every other* affected row's
    // entity-name triggers (warm-yellow tint via .is-tracked) and the
    // data-tracked-* row attribute the stripe CSS reads. Idempotent.
    const ENTITY_ROW_ATTR = { person: "author", repo: "repo", org: "org" };
    document.addEventListener("entityTrackedChanged", (e) => {
      const { kind, key, is_tracked } = e.detail;
      const rowAttr = ENTITY_ROW_ATTR[kind];
      if (!rowAttr) return;
      const escaped = CSS.escape(key);
      // Entity-name triggers of this kind referencing this key.
      document.querySelectorAll(
        `[data-tracked-trigger][data-kind="${kind}"][data-key="${escaped}"]`
      ).forEach((el) => {
        el.classList.toggle("is-tracked", is_tracked);
      });
      // Rows whose author/repo/org matches — drives the subtle row stripe.
      // dataset key shape: data-tracked-author → tracked + Author camelCase.
      const datasetKey =
        "tracked" + rowAttr.charAt(0).toUpperCase() + rowAttr.slice(1);
      document.querySelectorAll(
        `tr[data-${rowAttr}="${escaped}"]`
      ).forEach((tr) => {
        tr.dataset[datasetKey] = String(is_tracked);
      });
    });

    // Preserve which popovers are open (and any unsaved typing) across
    // full-table refreshes. Without this, the visibilitychange auto-refresh
    // would dismiss whatever popover the user has open mid-edit. Scoped to
    // #notifications-table swaps — per-row swaps (track, mark-read)
    // legitimately close the popover because the originating action is done.
    let popoverSnapshot = null;
    document.addEventListener("htmx:beforeSwap", (e) => {
      const tgt = e.detail.target;
      if (!tgt || tgt.id !== "notifications-table") return;
      popoverSnapshot = [];
      tgt.querySelectorAll(".action-popover").forEach((p) => {
        if (!p.matches(":popover-open")) return;
        const ta = p.querySelector("textarea");
        const focused = ta === document.activeElement;
        popoverSnapshot.push({
          threadId: p.dataset.threadId,
          kind: p.dataset.kind,
          dirty: ta && ta.value !== ta.defaultValue ? ta.value : null,
          focused,
          selStart: focused && ta ? ta.selectionStart : 0,
          selEnd: focused && ta ? ta.selectionEnd : 0,
        });
      });
    });
    document.addEventListener("htmx:afterSwap", (e) => {
      const tgt = e.detail.target;
      if (!tgt || tgt.id !== "notifications-table" || !popoverSnapshot) return;
      for (const s of popoverSnapshot) {
        if (!s.threadId) continue;
        const pop = tgt.querySelector(
          `.action-popover[data-thread-id="${CSS.escape(s.threadId)}"]` +
          `[data-kind="${s.kind}"]`
        );
        if (!pop || typeof pop.showPopover !== "function") continue;
        try { pop.showPopover(); } catch (_) {}
        const ta = pop.querySelector("textarea");
        if (!ta) continue;
        if (s.dirty !== null) {
          ta.value = s.dirty;
          // New textarea has no HTMX debounce timer running, so nudge a save
          // so an unsaved edit doesn't just sit there until the next keystroke.
          const url = ta.closest("form")?.getAttribute("hx-post");
          if (url) {
            const data = new FormData();
            data.append("note_user", s.dirty);
            fetch(url, { method: "POST", body: data, keepalive: true });
          }
        }
        if (s.focused) {
          ta.focus();
          try { ta.setSelectionRange(s.selStart, s.selEnd); } catch (_) {}
        }
      }
      popoverSnapshot = null;
    });

    // bfcache restoration: when a page comes back from the back-forward
    // cache, the in-memory DOM is restored — for our table that means
    // pre-save textarea state with no real server fetch. Force a real
    // reload so the user sees the server's truth.
    window.addEventListener("pageshow", (e) => {
      if (e.persisted) location.reload();
    });

    // Flush dirty note textareas on tab close / reload / navigation.
    // sendBeacon is the browser-native API for fire-and-forget POSTs that
    // survive page unload (regular fetch/XHR may be cancelled mid-flight).
    window.addEventListener("pagehide", () => {
      document.querySelectorAll(".action-popover form").forEach((form) => {
        const ta = form.querySelector("textarea");
        if (!ta) return;
        if (ta.value === ta.defaultValue) return;
        const url = form.getAttribute("hx-post");
        if (!url) return;
        const data = new FormData();
        data.append("note_user", ta.value);
        navigator.sendBeacon(url, data);
      });
    });
  </script>
</head>
<body>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
