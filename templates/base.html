<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GitHub Triage</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='icon.svg') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='vendor/pico.min.css') }}">
  <script src="{{ url_for('static', filename='vendor/htmx.min.js') }}" defer></script>
  <style>
    main.container { max-width: 1200px; padding-top: 1.5rem; }
    table { font-size: 0.9rem; }
    th, td { vertical-align: middle; }
    td.status {
      white-space: nowrap;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      align-items: flex-start;
    }
    .status-pill {
      display: inline-block;
      padding: 0.1rem 0.5rem;
      border-radius: 0.5rem;
      font-size: 0.7rem;
      font-weight: 500;
      color: white;
      white-space: nowrap;
    }
    /* Mergeable state warnings (top of stack — most actionable) */
    .status-pill.sev-danger  { background: #cf222e; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; font-size: 0.66rem; }
    .status-pill.sev-warning { background: #bf8700; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; font-size: 0.66rem; }
    /* Review state: positive (green) / negative (red) */
    .status-pill.review-approved { background: #1a7f37; }
    .status-pill.review-changes  { background: #cf222e; }
    /* 'New since last looked' indicator — small orange dot, applies to any pill */
    .status-pill.pill-new::before {
      content: "";
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #bf8700;
      margin-right: 0.4rem;
      vertical-align: 0.05em;
      box-shadow: 0 0 0 1.5px rgba(255,255,255,0.35);
    }
    /* Action-needed: red for direct, orange for team */
    .status-pill.action-assigned    { background: #cf222e; }
    .status-pill.action-review-you  { background: #cf222e; }
    .status-pill.action-review-team { background: #d29922; }
    /* Independent flags */
    .status-pill.flag-mention { background: #bc4c00; }
    td.title { width: 100%; }

    /* type pill — color tracks GitHub state, not type */
    td.type { width: 1%; white-space: nowrap; }
    .type-pill {
      display: inline-block;
      padding: 0.1rem 0.5rem;
      border-radius: 0.6rem;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: white;
      background: #6e7781; /* default for Discussion / Release / not-yet-enriched */
    }
    .type-pill.state-open                { background: #1f883d; }
    .type-pill.state-draft               { background: #57606a; }
    .type-pill.state-merged,
    .type-pill.state-closed_completed    { background: #8250df; }
    .type-pill.state-closed_pr           { background: #cf222e; }
    .type-pill.state-closed_not_planned  { background: #6e7781; }

    /* repo cell — owner above, name below, author below that, all clickable */
    td.repo { width: 1%; white-space: nowrap; line-height: 1.15; padding-right: 1rem; }
    td.repo a { text-decoration: none; }
    td.repo a:hover { text-decoration: underline; }
    .repo-owner {
      display: block;
      font-size: 0.7rem;
      color: var(--pico-muted-color);
    }
    .repo-name {
      display: block;
      font-size: 0.88rem;
      font-weight: 600;
    }
    .repo-author {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      margin-top: 0.2rem;
      font-size: 0.72rem;
      color: var(--pico-muted-color);
    }
    .repo-author .author-by { opacity: 0.7; }
    .repo-author .author-login { color: var(--pico-color); }
    .author-icon {
      width: 0.95em;
      height: 0.95em;
      flex-shrink: 0;
      cursor: help;
    }
    .author-icon.icon-member    { color: #1a7f37; }
    .author-icon.icon-firsttime { color: #bf8700; }
    .author-icon.icon-self      { color: #4493f8; }

    /* Favorite stars — inline-block with negative vertical-align trick keeps
       the SVG sitting at the same baseline as adjacent text (same approach
       used by the comment/eye icons in the meta row). */
    .star-btn {
      background: none;
      border: none;
      padding: 0;
      margin: 0;
      cursor: pointer;
      color: var(--pico-muted-color);
      width: auto;
      line-height: 1;
      display: inline-block;
    }
    .star-btn svg {
      width: 0.95em;
      height: 0.95em;
      vertical-align: -0.13em;
    }
    .star-btn:not(.is-favorite) svg { fill: none; stroke: currentColor; stroke-width: 2; }
    .star-btn.is-favorite { color: #d4a017; }
    .star-btn.is-favorite svg { fill: currentColor; stroke: currentColor; stroke-width: 2; }
    .item-star { margin-right: 0.45rem; }
    .person-star svg { width: 0.85em; height: 0.85em; }

    /* Row-level highlights: 'yours' (blue) and 'favorite' (gold).
       Favorite wins when both apply, since favoriting is an explicit choice. */
    tr.is-yours-row td:first-child    { box-shadow: inset 3px 0 0 #4493f8; }
    tr.is-favorite-row td:first-child { box-shadow: inset 3px 0 0 #d4a017; }

    /* Notes — pencil button in actions toggles a full-width drawer row
       beneath the main row. Drawer is collapsed by default. */
    .note-btn {
      background: none;
      border: none;
      padding: 0.2rem 0.4rem;
      margin: 0;
      cursor: pointer;
      color: var(--pico-muted-color);
      display: inline-block;
      width: auto;
      line-height: 1;
    }
    .note-btn svg {
      width: 1em;
      height: 1em;
      vertical-align: -0.18em;
    }
    .note-btn.has-note { color: #bf8700; }
    .note-btn:hover { color: var(--pico-color); }

    tr.note-drawer { display: none; }
    tr.note-drawer.open { display: table-row; }
    tr.note-drawer td {
      padding: 0.5rem 1.2rem 0.8rem;
      background: var(--pico-card-background-color);
      border-top: none;
    }
    tr.note-drawer textarea {
      width: 100%;
      margin: 0;
      font-size: 0.85rem;
      min-height: 3rem;
      padding: 0.5rem 0.7rem;
    }

    /* title cell — metrics line + labels line, separated visually */
    td.title .meta-metrics {
      font-size: 0.74rem;
      color: var(--pico-muted-color);
      margin-top: 0.25rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      align-items: center;
    }
    td.title .meta-labels {
      margin-top: 0.3rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      align-items: center;
    }
    /* Each metric group sits in a subtle pill so the boundaries are obvious. */
    .meta-stat {
      display: inline-flex;
      gap: 0.3rem;
      align-items: baseline;
      padding: 0.08rem 0.5rem;
      border-radius: 0.45rem;
      background: rgba(140, 149, 159, 0.12);
      white-space: nowrap;
      cursor: help;
    }
    .meta-diff {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 0.72rem;
    }
    /* Diff stays green/red (universal diff convention) but desaturated +
       regular weight, so it reads as factual metric — distinct from the
       saturated bold ▲/▼ reaction colors which carry sentiment. */
    .meta-diff .add { color: #5b8c64; }
    .meta-diff .del { color: #a8676b; }
    .meta-new {
      background: #bf8700;
      color: white;
      padding: 0 0.3rem;
      border-radius: 0.3rem;
      font-size: 0.66rem;
      font-weight: 500;
    }
    .meta-rx .rx-pos { color: #1a7f37; font-weight: 600; }
    .meta-rx .rx-neg { color: #cf222e; font-weight: 600; }
    .meta-interest { gap: 0.4rem; }
    .interest-part { display: inline-flex; align-items: center; gap: 0.3rem; }
    .meta-sep { color: var(--pico-muted-color); opacity: 0.5; }
    .icon {
      width: 0.95em;
      height: 0.95em;
      vertical-align: -0.13em;
      flex-shrink: 0;
    }
    .label-pill {
      display: inline-block;
      padding: 0.02rem 0.4rem;
      border-radius: 0.5rem;
      font-size: 0.62rem;
      font-weight: 500;
      line-height: 1.45;
      white-space: nowrap;
      opacity: 0.9;
    }
    .label-more {
      font-size: 0.62rem;
      color: var(--pico-muted-color);
      cursor: help;
      padding: 0 0.2rem;
    }

    /* actions — vertical 3-line list: Read / Muted (mutually exclusive) + Note */
    td.actions { white-space: nowrap; width: 1%; vertical-align: top; padding-top: 0.4rem; }
    td.actions .action-line {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      width: 100%;
      padding: 0.15rem 0.4rem;
      margin: 0;
      background: none;
      border: none;
      border-radius: 0.3rem;
      cursor: pointer;
      font-size: 0.82rem;
      color: var(--pico-color);
      text-align: left;
      line-height: 1.3;
    }
    /* Wrap Read + Muted in a subtle pill so the radio group reads as one unit
       (Note sits outside it). Same tint family as the meta-stat pills above. */
    td.actions .action-group {
      background: rgba(140, 149, 159, 0.08);
      border-radius: 0.45rem;
      padding: 0.15rem;
    }
    td.actions .action-line:hover {
      background: rgba(140, 149, 159, 0.18);
    }
    td.actions .action-line .action-mark {
      width: 0.95em;
      height: 0.95em;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--pico-muted-color);
    }
    td.actions .action-line .action-mark svg {
      width: 100%;
      height: 100%;
    }
    td.actions .action-line.active .action-mark { color: #1a7f37; }
    /* Note sits outside the Read/Muted pill — small breathing room. */
    td.actions .note-line { margin-top: 0.3rem; }
    td.actions .note-line.has-note .action-mark { color: #bf8700; }

    /* time bucket separators */
    tr.bucket-separator td {
      background: transparent;
      color: var(--pico-muted-color);
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0.9rem 0.5rem 0.25rem;
      border-bottom: 1px solid var(--pico-muted-border-color);
    }
    tr.bucket-separator + tr td { padding-top: 0.5rem; }

    .toolbar { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.75rem; }
    .toolbar h1 { margin: 0; flex: 1; }
    .brand-logo { width: 1.6rem; height: 1.6rem; flex-shrink: 0; color: var(--pico-h1-color, currentColor); }
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.9rem 1.4rem;
      align-items: center;
      margin: 0 0 1rem;
      padding: 0.5rem 0.75rem;
      border-top: 1px solid var(--pico-muted-border-color);
      border-bottom: 1px solid var(--pico-muted-border-color);
      font-size: 0.82rem;
    }
    .filter-bar .filter-toggle,
    .filter-bar .filter-select {
      margin: 0;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      cursor: pointer;
      user-select: none;
    }
    .filter-bar input[type="checkbox"] { margin: 0; }
    .filter-bar select {
      margin: 0;
      padding: 0.15rem 0.4rem;
      font-size: 0.82rem;
      min-width: 7rem;
      width: auto;
      height: auto;
      background-position: right 0.4rem center;
    }
    .filter-spacer { flex: 1; }
    .error { color: var(--pico-color-red-500); margin-bottom: 1rem; }
    tr.read { opacity: 0.45; }
    tr.read:hover { opacity: 1; }
    tr.action-error { outline: 1px solid var(--pico-color-red-500); }
  </style>
  <script>
    document.addEventListener("htmx:responseError", (e) => {
      const tr = e.detail.elt.closest("tr");
      if (tr) tr.classList.add("action-error");
      const status = e.detail.xhr.status;
      console.error("Action failed:", status, e.detail.xhr.responseText);
      alert(`Action failed (HTTP ${status}). See terminal for details.`);
    });

    // Auto-refresh when the tab regains focus (catches reads done on github.com).
    // Debounced to once per 30s to avoid hammering the API on tab-switching.
    let lastFocusRefresh = Date.now();
    document.addEventListener("visibilitychange", () => {
      if (document.hidden) return;
      if (Date.now() - lastFocusRefresh < 30000) return;
      const target = document.querySelector("#notifications-table");
      if (!target) return;
      lastFocusRefresh = Date.now();
      htmx.ajax("POST", "/refresh", { target, swap: "innerHTML" });
    });

    // Person favorite toggles broadcast a personFavoriteChanged event so all
    // rows showing the same author update their star, not just the row that
    // was clicked. Originating row is also updated by the HTMX row-swap; this
    // handler uses force-set semantics (toggle's 2nd arg) so it's idempotent.
    document.addEventListener("personFavoriteChanged", (e) => {
      const { login, is_favorite } = e.detail;
      const sel = `button.person-star[hx-post="/people/${login}/favorite"]`;
      document.querySelectorAll(sel).forEach((btn) => {
        btn.classList.toggle("is-favorite", is_favorite);
        btn.setAttribute("title", `${is_favorite ? "Unfavorite" : "Favorite"} ${login}`);
      });
    });

    // Flush dirty note textareas on tab close / reload / navigation.
    // sendBeacon is the browser-native API for fire-and-forget POSTs that
    // survive page unload (regular fetch/XHR may be cancelled mid-flight).
    window.addEventListener("pagehide", () => {
      document.querySelectorAll(".note-drawer form").forEach((form) => {
        const ta = form.querySelector("textarea");
        if (!ta) return;
        if (ta.value === ta.defaultValue) return;  // not dirty — skip
        const url = form.getAttribute("hx-post");
        if (!url) return;
        const data = new FormData();
        data.append("note_user", ta.value);
        navigator.sendBeacon(url, data);
      });
    });
  </script>
</head>
<body>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
