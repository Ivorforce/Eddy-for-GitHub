{% extends "base.html" %}
{% block content %}
<div class="toolbar">
  <svg class="brand-logo" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"/></svg>
  <h1>Triage</h1>
  <button hx-post="/refresh"
          hx-include="#filters"
          hx-target="#notifications-table">
    Refresh
  </button>
  <button class="secondary outline"
          hx-post="/backfetch"
          hx-include="#filters"
          hx-target="#notifications-table"
          title="Pull last 20 notifications (including read) and force re-enrichment. Temporary.">
    Backfetch
  </button>
  <span id="status-dot" class="status-dot status-idle" title="Up to date"></span>
</div>
<form id="filters"
      class="filter-bar"
      hx-get="/list"
      hx-target="#notifications-table"
      hx-trigger="change">
  <label class="filter-toggle">
    <input type="checkbox" name="action_only" {% if filters.action_only %}checked{% endif %}>
    Action needed only
  </label>
  <label class="filter-toggle">
    <input type="checkbox" name="hide_read" {% if filters.hide_read %}checked{% endif %}>
    Hide read
  </label>
  <label class="filter-toggle">
    <input type="checkbox" name="favorites_only" {% if filters.favorites_only %}checked{% endif %}>
    Favorites only
  </label>
  <span class="filter-spacer"></span>
  <label class="filter-select">
    Repo
    <select name="repo">
      <option value="">All</option>
      {% for r in repos %}
      <option value="{{ r }}" {% if filters.repo == r %}selected{% endif %}>{{ r }}</option>
      {% endfor %}
    </select>
  </label>
  <label class="filter-select">
    Sort
    <select name="sort">
      <option value="updated" {% if filters.sort == "updated" %}selected{% endif %}>Most recent</option>
      <option value="engaged" {% if filters.sort == "engaged" %}selected{% endif %}>Most engagement</option>
    </select>
  </label>
</form>
<div id="notifications-table">
  {% include "_table.html" %}
</div>
{% endblock %}
